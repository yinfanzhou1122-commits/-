<script>
// =============================================
// 全局状态
// =============================================
let parsedScenes = [];
window.currentSceneStylePrompt = '';
window.currentSceneStyleLabel = '自定义';
window.sceneStyleConfirmed = false;

// =============================================
// 风格预设
// =============================================
function selectSceneStylePreset(btn, prompt) {
    window.currentSceneStylePrompt = prompt;
    window.currentSceneStyleLabel = btn.textContent.trim();
    window.sceneStyleConfirmed = false;
    document.querySelectorAll('#scene-style-preset-btns .scene-style-btn').forEach(b => {
        b.classList.remove('bg-[#ff5e00]', 'text-white', 'border-[#ff5e00]', 'font-bold');
        b.classList.add('bg-transparent', 'border-orange-900/60', 'text-orange-200');
    });
    btn.classList.add('bg-[#ff5e00]', 'text-white', 'border-[#ff5e00]', 'font-bold');
    btn.classList.remove('bg-transparent', 'border-orange-900/60', 'text-orange-200');
    document.getElementById('scene-custom-style-input-wrap').classList.add('hidden');
    saveSceneState();
}

function toggleSceneCustomStyleInput(btn) {
    const wrap = document.getElementById('scene-custom-style-input-wrap');
    if (wrap.classList.contains('hidden')) {
        wrap.classList.remove('hidden');
        document.getElementById('scene-custom-style-input').focus();
        // 切换到自定义时，清空预设提示词
        window.currentSceneStylePrompt = '';
        window.currentSceneStyleLabel = '自定义';
        window.sceneStyleConfirmed = false;
    } else {
        wrap.classList.add('hidden');
    }
}

function confirmSceneCustomStyle() {
    const input = document.getElementById('scene-custom-style-input');
    const text = input.value.trim();
    if (!text) return;
    window.currentSceneStylePrompt = text;
    const btn = document.getElementById('scene-custom-style-btn');
    document.querySelectorAll('#scene-style-preset-btns .scene-style-btn').forEach(b => {
        b.classList.remove('bg-[#ff5e00]', 'text-white', 'border-[#ff5e00]', 'font-bold');
        b.classList.add('bg-transparent', 'border-orange-900/60', 'text-orange-200');
    });
    btn.classList.add('bg-[#ff5e00]', 'text-white', 'border-[#ff5e00]', 'font-bold');
    btn.classList.remove('bg-transparent', 'border-orange-900/60', 'text-orange-200');
    document.getElementById('scene-custom-style-input-wrap').classList.add('hidden');
    saveSceneState();
}

// =============================================
// 上传设定 Modal 控制
// =============================================
const uploadBtn = document.getElementById('btn-upload-settings');
const uploadModal = document.getElementById('upload-modal');
const closeUploadModal = document.getElementById('close-upload-modal');
const uploadCancelBtn = document.getElementById('upload-cancel-btn');
const uploadConfirmBtn = document.getElementById('upload-confirm-btn');
const uploadTextContent = document.getElementById('upload-text-content');
const uploadStatus = document.getElementById('upload-status');

uploadBtn.addEventListener('click', () => {
    uploadModal.classList.remove('hidden');
    uploadTextContent.focus();
});
closeUploadModal.addEventListener('click', () => uploadModal.classList.add('hidden'));
uploadCancelBtn.addEventListener('click', () => uploadModal.classList.add('hidden'));
uploadModal.addEventListener('click', (e) => {
    if (e.target === uploadModal) uploadModal.classList.add('hidden');
});

// =============================================
// 解析「空间：」段落
// =============================================
function parseScenesFromText(text) {
    const lines = text.split('\n');
    const scenes = [];
    let inSection = false;
    for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed === '空间：') { inSection = true; continue; }
        if (inSection) {
            // 遇到下一段落标记或空行后的段落标记则停止
            if (/^(道具\/特效|角色生图提示词|角色配音提示词)/.test(trimmed)) break;
            if (!trimmed) continue; // 跳过空行
            const match = trimmed.match(/^(.+?)（(\d+)次\/(\d+)）：(.+)$/);
            if (match) {
                scenes.push({
                    name: match[1],
                    count: parseInt(match[2]),
                    episode: match[3],
                    rawBracket: `${match[2]}次/${match[3]}`,
                    prompt: match[4]
                });
            }
            // 仅有名称无描述的行跳过（如「渝州城街道（1次/51）：」）
        }
    }
    return scenes;
}

// =============================================
// 确认解析
// =============================================
uploadConfirmBtn.addEventListener('click', () => {
    const text = uploadTextContent.value.trim();
    if (!text) { uploadStatus.textContent = '⚠️ 请粘贴设定文本'; uploadStatus.classList.remove('hidden'); return; }
    uploadStatus.textContent = '⏳ 正在解析...'; uploadStatus.classList.remove('hidden');
    parsedScenes = parseScenesFromText(text);
    window.sceneStyleConfirmed = false;
    if (parsedScenes.length === 0) { uploadStatus.textContent = '⚠️ 未找到「空间：」段落中的场景数据'; return; }
    uploadStatus.textContent = `✅ 成功解析 ${parsedScenes.length} 个场景`;
    renderSceneRows(parsedScenes);
    updateSceneStats(parsedScenes);
    // 重新上传时清空生成数据
    Object.keys(sceneGeneratedImages).forEach(k => delete sceneGeneratedImages[k]);
    Object.keys(sceneGeneratedPrompts).forEach(k => delete sceneGeneratedPrompts[k]);
    Object.keys(sceneMultiAngleImages).forEach(k => delete sceneMultiAngleImages[k]);
    saveSceneState();
    setTimeout(() => uploadModal.classList.add('hidden'), 600);
});

// =============================================
// 更新统计
// =============================================
function updateSceneStats(scenes) {
    const total = scenes.length;
    const core = scenes.filter(s => s.count >= 50).length;
    const statsEl = document.getElementById('scene-stats-text');
    if (statsEl) {
        statsEl.textContent = `共 ${total} 个场景，${core} 个核心场景`;
    }
}

function openSceneMatchPanel() {
    document.getElementById('scene-match-modal')?.remove();

    const overlay = document.createElement('div');
    overlay.id = 'scene-match-modal';
    overlay.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]';
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

    const categories = [
        { id: 'realistic', label: '真人', icon: '📷', desc: '真人写实风格场景', style: 'real' },

/** 执行场景向量匹配 */
async function applySceneMatch() {
    if (!parsedScenes || parsedScenes.length === 0) {
        alert('请先上传场景设定');
        return;
    }

    const style = getSceneMatchStyle();
    console.log('[场景匹配] 风格:', style);

    // 收集选中的场景
    const checkedScenes = [];
    parsedScenes.forEach((sc, i) => {
        const cb = document.getElementById(`scene-check-${i}`);
        if (cb && cb.checked) checkedScenes.push({ index: i, scene: sc });
    });
    if (checkedScenes.length === 0) {
        // 没有选中时匹配全部
        parsedScenes.forEach((sc, i) => checkedScenes.push({ index: i, scene: sc }));
    }

    // 更新按钮状态
    const applyBtn = document.getElementById('sm-apply-btn');
    if (applyBtn) {
        applyBtn.textContent = `⏳ 匹配中 0/${checkedScenes.length}`;
        applyBtn.disabled = true;
    }

    let matchedCount = 0;
    let errorCount = 0;

    for (const { index, scene } of checkedScenes) {
        try {
            const res = await fetch(`${SCENE_API_BASE}/vector/scene-match`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: scene.prompt || scene.name,
                    style,
                    topK: 3
                })
            });
            const data = await res.json();
            if (data.success && data.results && data.results.length > 0) {
                renderSceneRecommendations(index, data.results);
                matchedCount++;
            } else {
                renderSceneRecommendations(index, [], data.message || '无匹配结果');
            }
        } catch (err) {
            console.error(`场景 ${scene.name} 匹配失败:`, err);
            renderSceneRecommendations(index, [], err.message);
            errorCount++;
        }
        if (applyBtn) applyBtn.textContent = `⏳ 匹配中 ${matchedCount}/${checkedScenes.length}`;
    }

    // 关闭弹窗
    document.getElementById('scene-match-modal')?.remove();

    // 结果提示
    const msg = errorCount > 0
        ? `匹配完成！成功 ${matchedCount}/${checkedScenes.length}，失败 ${errorCount}`
        : `匹配完成！共匹配 ${matchedCount}/${checkedScenes.length} 个场景`;
    alert(msg);
}

    const col2 = document.getElementById(`scene-col2-${sceneIndex}`);

    // 清除旧推荐
    col2.querySelectorAll('.scene-recommend-strip').forEach(el => el.remove());

    const strip = document.createElement('div');
    strip.className = 'scene-recommend-strip absolute top-1 left-1 right-1 z-10 flex gap-1 items-start';

    if (!results || results.length === 0) {
        strip.innerHTML = `<div class="text-[8px] text-orange-700 bg-black/80 px-2 py-1 border border-orange-900/30">
            📭 ${errorMsg || '场景文件夹中无匹配图片，请先在 image/场景/ 中添加图片并构建索引'}
        </div>`;
        col2.style.position = 'relative';
        col2.appendChild(strip);
        return;
    }

    // 标题标签
    strip.innerHTML = `<div class="text-[7px] text-emerald-500 bg-black/80 px-1 py-0.5 border border-emerald-800/40 font-bold whitespace-nowrap self-center">🧠 AI推荐</div>`;

    results.forEach((r, i) => {
        const pct = Math.round((r.score || 0) * 100);
        const colorClass = pct >= 80 ? 'border-emerald-500' : pct >= 60 ? 'border-yellow-500' : 'border-orange-500';
        const imgUrl = r.url.startsWith('http') ? r.url : `http://localhost:3115${r.url}`;

        const thumb = document.createElement('div');
        thumb.className = `relative cursor-pointer group border ${colorClass} bg-black/60 hover:scale-105 transition-transform`;
        thumb.style.cssText = 'width: 100px; height: 56px;';
        thumb.title = `${r.era || ''}${r.location || ''} | 相似度: ${pct}% | 风格: ${r.style}`;

const sceneGeneratedImages = {};  // sceneIndex → [图片URL数组]

// =============================================
// 滑动窗口调度器
// 始终保持 concurrency 个请求在飞，成功返回即补发
// 失败追加到队列末尾最多重试 1 次
// =============================================
async function slidingWindowExecutor(tasks, concurrency = 10, onProgress) {
    // tasks: [{ id, fn: async () => result, retried: false }]
    const queue = [...tasks];
    const errors = [];       // { id, error }
    const successes = [];    // { id }
    let inFlightCount = 0;
    let totalDone = 0;
    const totalTasks = tasks.length; // 原始任务数（不含重试）

    function reportProgress() {
        if (onProgress) {
            onProgress({
                done: totalDone,
                total: totalTasks,
                inFlight: inFlightCount,
                errors: errors.length,
                queued: queue.length
            });
        }
    }

    return new Promise((resolve) => {
        function checkDone() {
            if (inFlightCount === 0 && queue.length === 0) {
                resolve({ successes, errors });
            }
        }

        function launchNext() {
            while (inFlightCount < concurrency && queue.length > 0) {
                const task = queue.shift();
                inFlightCount++;
                reportProgress();

                task.fn().then(() => {
                    // 成功
                    inFlightCount--;
                    totalDone++;
                    successes.push({ id: task.id });
                    reportProgress();
                    launchNext();
                    checkDone();
                }).catch((err) => {
                    // 失败
                    inFlightCount--;
                    if (!task.retried) {
                        // 第一次失败 → 追加到队列末尾，标记为已重试
                        queue.push({ ...task, retried: true });
                        reportProgress();
                        launchNext();
                        checkDone();
                    } else {
                        // 第二次失败 → 最终记入错误列表
                        totalDone++;
                        errors.push({ id: task.id, error: err?.message || String(err) });
                        reportProgress();
                        launchNext();
                        checkDone();
                    }
                });
            }
        }

        if (queue.length === 0) {
            resolve({ successes, errors });
            return;
        }

        launchNext();
    });
}

async function startSceneBatchDownload() {
    const dlScenes = document.getElementById('sdl-scenes')?.checked;
    const dlMulti = document.getElementById('sdl-multiangle')?.checked;
    if (!dlScenes && !dlMulti) { alert('请至少选择一种图片类型'); return; }
    if (!parsedScenes || parsedScenes.length === 0) { alert('没有场景数据'); return; }

    const urls = [];
    parsedScenes.forEach((sc, i) => {
        const name = sc.name || `场景${i}`;
        if (dlScenes && sceneGeneratedImages[i]) {
            sceneGeneratedImages[i].forEach((url, j) => {
                urls.push({ url, name: `${name}_场景图_${j+1}`, type: 'scene' });
            });
        }
        if (dlMulti && sceneMultiAngleImages[i]) {
            const labels = ['左','右','反打','近景','远景','核心区域'];
            for (const [si, url] of Object.entries(sceneMultiAngleImages[i])) {
                urls.push({ url, name: `${name}_${labels[si]||si}`, type: 'multi' });
            }
        }
    });

    if (urls.length === 0) { alert('没有找到可下载的图片'); return; }
    document.getElementById('scene-download-menu')?.classList.add('hidden');

    const zip = new JSZip();
    const total = urls.length;
    let done = 0;
    const btn = document.querySelector('[onclick*="toggleSceneDownloadMenu"]');
    const orig = btn?.textContent;
    if (btn) btn.textContent = `⬇️ 打包中 0/${total}`;

    for (const item of urls) {
        try {
            const resp = await fetch(item.url);
            const blob = await resp.blob();
            const ext = '.png';
            const folder = item.type === 'scene' ? '场景图' : '多维视角';
            zip.folder(folder).file(`${item.name}${ext}`, blob);
        } catch(e) { console.warn('获取失败:', item.name); }
        done++;
        if (btn) btn.textContent = `⬇️ 打包中 ${done}/${total}`;
    }

    if (btn) btn.textContent = '⬇️ 生成ZIP中...';
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const zipName = `场景图片_${new Date().toLocaleDateString().replace(/\//g,'-')}.zip`;
    const uploadRes = await fetch(`/api/download-zip?filename=${encodeURIComponent(zipName)}`, {
        method: 'POST', headers: { 'Content-Type': 'application/octet-stream' }, body: zipBlob
    });
    const { url: downloadUrl } = await uploadRes.json();
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none'; iframe.src = downloadUrl;
    document.body.appendChild(iframe);
    setTimeout(() => iframe.remove(), 10000);
    if (btn) btn.textContent = orig || '📥 一键下载';
    alert(`打包完成！共 ${total} 张图片`);
}

function restoreSceneState() {
    try {
        const saved = localStorage.getItem('scene_parsedScenes');
        if (!saved) return false;

        parsedScenes = JSON.parse(saved);
        if (!parsedScenes || parsedScenes.length === 0) return false;

        // 恢复生成数据
        const savedImgs = localStorage.getItem('scene_generatedImages');
        const savedPrompts = localStorage.getItem('scene_generatedPrompts');
        const savedMA = localStorage.getItem('scene_multiAngleImages');
        const savedStyle = localStorage.getItem('scene_stylePreset');
        const savedRatio = localStorage.getItem('scene_aspectRatio');

        if (savedImgs) Object.assign(sceneGeneratedImages, JSON.parse(savedImgs));
        if (savedPrompts) Object.assign(sceneGeneratedPrompts, JSON.parse(savedPrompts));
        if (savedMA) Object.assign(sceneMultiAngleImages, JSON.parse(savedMA));
        if (savedStyle) {
            const style = JSON.parse(savedStyle);
            window.currentSceneStylePrompt = style.prompt || '';
            window.currentSceneStyleLabel = style.label || '自定义';
        }
        if (savedRatio) currentAspectRatio = savedRatio;

        // 渲染行
        renderSceneRows(parsedScenes);
        updateSceneStats(parsedScenes);

        // 恢复已生成的图片
        for (const [idx, urls] of Object.entries(sceneGeneratedImages)) {
            const i = parseInt(idx);
            const scene = parsedScenes[i];
            if (!scene || !urls || urls.length === 0) continue;
            urls.forEach(url => {
                showSceneResult(i, url, scene.name, sceneGeneratedPrompts[i] || '');
            });
            // 移除“新生成”标签（恢复时不需要）
            const col2 = document.getElementById(`scene-col2-${i}`);
            if (col2) col2.querySelectorAll('.new-badge').forEach(b => b.remove());
        }

        // 恢复多角度图片
        for (const [idx, slots] of Object.entries(sceneMultiAngleImages)) {
            const i = parseInt(idx);
            for (const [slotIdx, url] of Object.entries(slots)) {
                const si = parseInt(slotIdx);
                const label = MULTI_ANGLE_PROMPTS[si]?.label || '';
                renderMultiAngleResult(i, si, url, label);
            }
        }

        // 恢复比例按钮状态
        if (currentAspectRatio === '9:16') {
            const arBtn = document.getElementById('aspect-ratio-btn');
            if (arBtn) {
                arBtn.textContent = '9:16';
                arBtn.classList.remove('bg-blue-600/20', 'text-blue-200', 'border-blue-500/60');
                arBtn.classList.add('bg-purple-600/20', 'text-purple-200', 'border-purple-500/60');
            }
        }

        console.log(`✅ 已恢复 ${parsedScenes.length} 个场景状态`);
        return true;
    } catch (e) {
        console.warn('恢复状态失败:', e);
        return false;
    }
}

// =============================================
// 获取 API Key
// =============================================
function getApiKey() {

    return localStorage.getItem('zhenzhen_api_key') || '';

// =============================================
// 单个场景生成
// =============================================
async function generateScene(sceneIndex, options = {}) {
    const { batchMode = false } = options;
    const scene = parsedScenes[sceneIndex];
    if (!scene) return;

    // 首次生图风格确认（批量模式下跳过，由调用方提前确认）
    if (!batchMode && !window.sceneStyleConfirmed) {
        if (!confirm(`当前风格预设为：${window.currentSceneStyleLabel || '未选择'}\n确定使用此风格生成图片吗？`)) return;
        window.sceneStyleConfirmed = true;
    }

    const btn = document.getElementById(`scene-gen-btn-${sceneIndex}`);
    const col2 = document.getElementById(`scene-col2-${sceneIndex}`);
    if (!col2) return;

    // 获取 textarea 中当前编辑过的提示词
    const row = document.querySelector(`[data-scene-index="${sceneIndex}"]`);
    const textarea = row?.querySelector('textarea');
    const rawPrompt = textarea ? textarea.value.trim() : scene.prompt;

    // 拼接风格预设
    let fullPrompt = rawPrompt;
    if (window.currentSceneStylePrompt) {
        fullPrompt = window.currentSceneStylePrompt + '。' + rawPrompt;
    }

    // 存储提示词（不含相机参数，用于显示）
    sceneGeneratedPrompts[sceneIndex] = fullPrompt;

    // 拼接相机参数（仅用于API调用）
    let apiPrompt = fullPrompt;
    const cameraPrompt = typeof getCameraPromptString === 'function' ? getCameraPromptString() : '';
    if (cameraPrompt) apiPrompt = cameraPrompt + '. ' + apiPrompt;

    if (btn) {
        btn.disabled = true;
        btn.textContent = '⏳ 生成中...';
        btn.classList.add('opacity-60', 'cursor-not-allowed');
    }

    // 确保 strip 容器存在
    let strip = col2.querySelector('.scene-image-strip');
    if (!strip) {
        col2.innerHTML = `
            <div class="w-full h-full flex flex-col p-2">
                <div class="scene-image-strip flex gap-2 flex-nowrap overflow-x-auto overflow-y-hidden flex-1 items-stretch" style="scrollbar-width:thin; scrollbar-color:#ff5e00 #0d0605;"></div>
                <button id="scene-regen-btn-${sceneIndex}" onclick="generateScene(${sceneIndex})" class="mt-1 w-full py-1.5 border border-orange-600/50 bg-orange-900/10 text-orange-300 text-[10px] font-bold hover:bg-orange-600 hover:text-white transition-all">🔄 重新生成</button>
            </div>`;
        strip = col2.querySelector('.scene-image-strip');
    }

    // 添加占位图片卡
    const placeholder = document.createElement('div');
    placeholder.className = 'relative flex-shrink-0 h-full scene-placeholder-card';
    placeholder.style.cssText = 'min-width:180px; min-height:120px;';
    placeholder.innerHTML = `
        <div class="w-full h-full border-2 border-orange-600/30 bg-orange-950/20 flex flex-col items-center justify-center gap-2" style="animation: pulse 1.5s ease-in-out infinite">
            <div class="w-8 h-8 border-2 border-orange-500 border-t-transparent rounded-full" style="animation: spin 1s linear infinite"></div>
            <span class="text-[10px] text-orange-500 font-bold">生成中...</span>
            <span class="text-[8px] text-orange-700">${scene.name}</span>
        </div>`;
    // 确保上传卡片之前插入
    const uploadCard = strip.querySelector('.scene-upload-card');
    if (uploadCard) strip.insertBefore(placeholder, uploadCard);
    else strip.appendChild(placeholder);
    // 滚动到占位卡
    placeholder.scrollIntoView({ behavior: 'smooth', inline: 'end' });

    // 添加动画样式（如果尚未存在）
    if (!document.getElementById('placeholder-anim-style')) {
        const style = document.createElement('style');
        style.id = 'placeholder-anim-style';
        style.textContent = `
            @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }`;
        document.head.appendChild(style);
    }

    // 禁用重新生成按钮
    const regenBtnDuring = document.getElementById(`scene-regen-btn-${sceneIndex}`);
    if (regenBtnDuring) {
        regenBtnDuring.disabled = true;
        regenBtnDuring.classList.add('opacity-40', 'cursor-not-allowed');
        regenBtnDuring.textContent = '⏳ 生成中...';
    }

    try {
        const res = await fetch(`${SCENE_API_BASE}/generate-scene`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                prompt: apiPrompt,
                apiKey: getApiKey(),
                aspect_ratio: currentAspectRatio
            })
        });
        const data = await res.json();

        // 移除占位卡
        placeholder.remove();

        if (data.success && data.imageUrl) {
            if (!sceneGeneratedImages[sceneIndex]) sceneGeneratedImages[sceneIndex] = [];
            sceneGeneratedImages[sceneIndex].push(data.imageUrl);
            sceneGeneratedPrompts[sceneIndex] = fullPrompt;
            showSceneResult(sceneIndex, data.imageUrl, scene.name, fullPrompt);
            if (btn) btn.textContent = '✅ 生成完成';
            saveSceneState();
        } else {
            placeholder.remove();
            if (btn) btn.textContent = '❌ 失败';
            const errMsg = data.message || '未知错误';
            console.error('生成失败:', errMsg);
            if (batchMode) {
                // 批量模式下抛出错误，由滑动窗口调度器统一处理
                throw new Error(errMsg);
            } else {
                alert('生成失败: ' + errMsg);
            }
        }
    } catch (err) {
        placeholder.remove();
        console.error('生成错误:', err);
        if (btn) btn.textContent = '❌ 错误';
        if (batchMode) {
            // 批量模式下重新抛出，由滑动窗口调度器统一处理
            throw err;
        } else {
            alert('生成错误: ' + err.message);
        }
    } finally {
        if (btn) {
            btn.disabled = false;
            setTimeout(() => {
                if (btn.textContent.startsWith('✅') || btn.textContent.startsWith('❌')) {
                    btn.textContent = '重新生成';
                }
                btn.classList.remove('opacity-60', 'cursor-not-allowed');
            }, 3000);
        }
        // 5秒冷却 regen 按钮
        const regenBtn2 = document.getElementById(`scene-regen-btn-${sceneIndex}`);
        if (regenBtn2) {
            regenBtn2.disabled = true;
            regenBtn2.classList.add('opacity-40', 'cursor-not-allowed');
            let cd = 5;
            regenBtn2.textContent = `请稍等 (${cd}s)`;
            const timer = setInterval(() => {
                cd--;
                if (cd <= 0) { clearInterval(timer); regenBtn2.disabled = false; regenBtn2.classList.remove('opacity-40', 'cursor-not-allowed'); regenBtn2.textContent = '🔄 重新生成'; }
                else regenBtn2.textContent = `请稍等 (${cd}s)`;
            }, 1000);
        }
    }
}

// =============================================
// 上传本地图片到场景
// =============================================
function handleSceneImageUpload(sceneIndex, files) {
    if (!files || files.length === 0) return;
    const scene = parsedScenes[sceneIndex];
    if (!scene) return;

    const file = files[0];
    if (!file.type.startsWith('image/')) {
        alert('请选择图片文件');
        return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
        const dataUrl = e.target.result;
        // 存储为生成图片
        if (!sceneGeneratedImages[sceneIndex]) sceneGeneratedImages[sceneIndex] = [];
        sceneGeneratedImages[sceneIndex].push(dataUrl);
        sceneGeneratedPrompts[sceneIndex] = sceneGeneratedPrompts[sceneIndex] || '(上传图片)';
        // 显示到第2列
        showSceneResult(sceneIndex, dataUrl, scene.name, '(上传图片)');
        saveSceneState();
    };
    reader.readAsDataURL(file);
}

// =============================================

function showSceneResult(sceneIndex, imageUrl, sceneName, fullPrompt) {
    const col2 = document.getElementById(`scene-col2-${sceneIndex}`);

                <button id="scene-regen-btn-${sceneIndex}" onclick="generateScene(${sceneIndex})" class="mt-1 w-full py-1.5 border border-orange-600/50 bg-orange-900/10 text-orange-300 text-[10px] font-bold hover:bg-orange-600 hover:text-white transition-all">🔄 重新生成</button>
            </div>`;

    }

    // 移除所有旧的"新生成"标签
    strip.querySelectorAll('.new-badge').forEach(badge => badge.remove());

    // 创建新图片卡
    const card = document.createElement('div');
    card.className = 'relative flex-shrink-0 group h-full scene-img-card';
    card.dataset.sceneIndex = sceneIndex;
    card.dataset.imgUrl = imageUrl;
    card.innerHTML = `
        <img src="${imageUrl}" alt="${sceneName}" class="h-full w-auto object-contain border-2 border-orange-900/30 cursor-pointer transition-all" onclick="openImagePreview(${sceneIndex})" />
        <div class="absolute top-1 left-1 px-1.5 py-0.5 bg-black/70 text-[9px] text-orange-400 font-bold">${sceneName}</div>
        <div class="new-badge absolute top-1 right-1 px-1.5 py-0.5 bg-[#ff5e00] text-white text-[9px] font-black rounded-sm">新生成</div>
        <button onclick="event.stopPropagation(); deleteSceneImage(${sceneIndex}, this.closest('.scene-img-card'))" class="absolute bottom-1 right-1 w-5 h-5 bg-red-600/80 hover:bg-red-500 text-white text-[10px] font-bold items-center justify-center hidden group-hover:flex transition-all" title="删除">✕</button>`;

    // 点击卡片切换选中
    card.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') return; // 不拦截下载链接
        selectSceneImage(sceneIndex, card);
    });

    strip.appendChild(card);

    // 自动选中新图片
    selectSceneImage(sceneIndex, card);

    // 确保上传卡片始终在最右边
    let uploadCard = strip.querySelector('.scene-upload-card');
    if (!uploadCard) {
        uploadCard = document.createElement('label');
        uploadCard.className = 'scene-upload-card flex-shrink-0 h-full w-[80px] border border-dashed border-orange-600/40 bg-orange-900/5 flex flex-col items-center justify-center cursor-pointer hover:bg-orange-600/20 hover:border-[#ff5e00] transition-all';
        uploadCard.setAttribute('ondragover', `event.preventDefault(); this.classList.add('border-[#ff5e00]','bg-orange-600/20');`);
        uploadCard.setAttribute('ondragleave', `this.classList.remove('border-[#ff5e00]','bg-orange-600/20');`);
        uploadCard.setAttribute('ondrop', `event.preventDefault(); this.classList.remove('border-[#ff5e00]','bg-orange-600/20'); handleSceneImageUpload(${sceneIndex}, event.dataTransfer.files);`);
        uploadCard.innerHTML = `
            <span class="text-orange-600 text-xl">📁</span>
            <span class="text-[9px] text-orange-600 font-bold mt-1">上传</span>
            <input type="file" accept="image/*" class="hidden" onchange="handleSceneImageUpload(${sceneIndex}, this.files)" />`;
        strip.appendChild(uploadCard);
    } else {
        // 移动到最后
        strip.appendChild(uploadCard);
    }

    // 添加hover浮动预览
    const img = card.querySelector('img');
    img.addEventListener('mouseenter', () => {
        const preview = document.createElement('div');
        preview.id = 'scene-hover-preview';
        preview.className = 'fixed z-[100] pointer-events-none';
        preview.innerHTML = `<img src="${imageUrl}" class="w-[720px] h-auto object-contain border border-orange-600/60 shadow-2xl" />`;
        const rect = img.getBoundingClientRect();
        preview.style.left = Math.max(10, rect.left - 300) + 'px';
        preview.style.top = Math.max(10, rect.top - 200) + 'px';
        document.body.appendChild(preview);
    });
    img.addEventListener('mouseleave', () => {
        const p = document.getElementById('scene-hover-preview');
        if (p) p.remove();
    });

    // 滚动到最新图片
    requestAnimationFrame(() => {
        strip.scrollLeft = strip.scrollWidth;
    });
}

// =============================================
// 从预览窗口重新生成
// =============================================
async function regenerateFromPreview(sceneIndex) {
    const scene = parsedScenes[sceneIndex];
    if (!scene) return;

    const textarea = document.getElementById('preview-prompt-edit');
    const aspectSelect = document.getElementById('preview-aspect-select');
    const regenBtn = document.getElementById('preview-regen-btn');
    if (!textarea || !regenBtn) return;

    const editedPrompt = textarea.value.trim();
    if (!editedPrompt) { alert('提示词不能为空'); return; }

    const aspectRatio = aspectSelect ? aspectSelect.value : currentAspectRatio;

    regenBtn.disabled = true;
    regenBtn.textContent = '⏳ 生成中...';

    try {
        const res = await fetch(`${SCENE_API_BASE}/generate-scene`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                prompt: editedPrompt,
                apiKey: getApiKey(),
                aspect_ratio: aspectRatio
            })
        });
        const data = await res.json();

        if (data.success && data.imageUrl) {
            // 更新存储
            sceneGeneratedPrompts[sceneIndex] = editedPrompt;
            if (!sceneGeneratedImages[sceneIndex]) sceneGeneratedImages[sceneIndex] = [];
            sceneGeneratedImages[sceneIndex].push(data.imageUrl);

            // 更新第2列
            showSceneResult(sceneIndex, data.imageUrl, scene.name, editedPrompt);

            // 更新预览图片
            const overlay = document.getElementById('image-preview-overlay');
            if (overlay) {
                const img = overlay.querySelector('img');
                if (img) img.src = data.imageUrl;
            }

            regenBtn.textContent = '✅ 完成';
            setTimeout(() => { regenBtn.textContent = '重新生成'; regenBtn.disabled = false; }, 2000);
            saveSceneState();
        } else {
            regenBtn.textContent = '❌ 失败';
            alert('生成失败: ' + (data.message || '未知错误'));
            setTimeout(() => { regenBtn.textContent = '重新生成'; regenBtn.disabled = false; }, 2000);
        }
    } catch (err) {
        console.error('生成错误:', err);
        regenBtn.textContent = '❌ 错误';
        alert('生成错误: ' + err.message);
        setTimeout(() => { regenBtn.textContent = '重新生成'; regenBtn.disabled = false; }, 2000);
    }
}

// =============================================
// 批量生成选中场景（滑动窗口，始终保持10个并发）
// =============================================
async function batchGenerateScenes() {
    if (!parsedScenes || parsedScenes.length === 0) {
        alert('请先上传场景设定');
        return;
    }

    // 收集已勾选的场景索引
    const checkedIndices = [];
    for (let i = 0; i < parsedScenes.length; i++) {
        const cb = document.getElementById(`scene-check-${i}`);
        if (cb && cb.checked) checkedIndices.push(i);
    }
    if (checkedIndices.length === 0) { alert('请至少勾选一个场景'); return; }

    const total = checkedIndices.length;
    if (!confirm(`即将生成 ${total} 个场景图，比例 ${currentAspectRatio}，是否继续？`)) return;

    // 批量模式下提前确认风格
    if (!window.sceneStyleConfirmed) {
        if (!confirm(`当前风格预设为：${window.currentSceneStyleLabel || '未选择'}\n确定使用此风格生成图片吗？`)) return;
        window.sceneStyleConfirmed = true;
    }

    // 标记所有按钮为排队中
    for (const idx of checkedIndices) {
        const btn = document.getElementById(`scene-gen-btn-${idx}`);
        if (btn) {
            btn.disabled = true;
            btn.textContent = '⏳ 排队中...';
            btn.classList.add('opacity-60', 'cursor-not-allowed');
        }
    }

    const statsEl = document.getElementById('scene-stats-text');

    // 包装为滑动窗口任务
    const tasks = checkedIndices.map(idx => ({
        id: idx,
        retried: false,
        fn: async () => {
            // 更新按钮为生成中
            const btn = document.getElementById(`scene-gen-btn-${idx}`);
            if (btn) btn.textContent = '⏳ 生成中...';
            try {
                await generateScene(idx, { batchMode: true });
            } catch (err) {
                // 标记按钮为失败（会在重试时再次更新）
                if (btn) btn.textContent = '❌ 失败';
                throw err;
            }
        }
    }));

    const { successes, errors } = await slidingWindowExecutor(tasks, 10, (progress) => {
        if (statsEl) {
            statsEl.textContent = `已完成 ${progress.done}/${progress.total}，飞行中 ${progress.inFlight}，错误 ${progress.errors}`;
        }
    });

    // 恢复统计
    updateSceneStats(parsedScenes);

    // 汇总结果
    if (errors.length > 0) {
        const errorNames = errors.map(e => {
            const scene = parsedScenes[e.id];
            return scene ? `${scene.name}（${e.error}）` : `场景${e.id}（${e.error}）`;
        }).join('\n');
        alert(`批量生成完成！成功 ${successes.length}/${total}，失败 ${errors.length} 个：\n${errorNames}`);
    } else {
        alert(`批量生成完成！全部 ${total} 个场景生成成功`);
    }
}

// =============================================
// 生成未生成场景（滑动窗口）
// =============================================
async function batchGenerateUngenerated() {
    if (!parsedScenes || parsedScenes.length === 0) {
        alert('请先上传场景设定');
        return;
    }

    // 找出所有还有「生成场景」按钮的（即未生成过的）
    const ungeneratedIndices = [];
    for (let i = 0; i < parsedScenes.length; i++) {
        const btn = document.getElementById(`scene-gen-btn-${i}`);
        if (btn && (btn.textContent === '生成场景' || btn.textContent === '重新生成')) {
            const cb = document.getElementById(`scene-check-${i}`);
            if (cb && cb.checked) ungeneratedIndices.push(i);
        }
    }

    if (ungeneratedIndices.length === 0) {
        alert('没有未生成的已勾选场景');
        return;
    }

    const total = ungeneratedIndices.length;
    if (!confirm(`即将生成 ${total} 个未生成的场景，比例 ${currentAspectRatio}，是否继续？`)) return;

    // 批量模式下提前确认风格
    if (!window.sceneStyleConfirmed) {
        if (!confirm(`当前风格预设为：${window.currentSceneStyleLabel || '未选择'}\n确定使用此风格生成图片吗？`)) return;
        window.sceneStyleConfirmed = true;
    }

    // 标记所有按钮为排队中
    for (const idx of ungeneratedIndices) {
        const btn = document.getElementById(`scene-gen-btn-${idx}`);
        if (btn) {
            btn.disabled = true;
            btn.textContent = '⏳ 排队中...';
            btn.classList.add('opacity-60', 'cursor-not-allowed');
        }
    }

    const statsEl = document.getElementById('scene-stats-text');

    // 包装为滑动窗口任务
    const tasks = ungeneratedIndices.map(idx => ({
        id: idx,
        retried: false,
        fn: async () => {
            const btn = document.getElementById(`scene-gen-btn-${idx}`);
            if (btn) btn.textContent = '⏳ 生成中...';
            try {
                await generateScene(idx, { batchMode: true });
            } catch (err) {
                if (btn) btn.textContent = '❌ 失败';
                throw err;
            }
        }
    }));

    const { successes, errors } = await slidingWindowExecutor(tasks, 10, (progress) => {
        if (statsEl) {
            statsEl.textContent = `已完成 ${progress.done}/${progress.total}，飞行中 ${progress.inFlight}，错误 ${progress.errors}`;
        }
    });

    updateSceneStats(parsedScenes);

    if (errors.length > 0) {
        const errorNames = errors.map(e => {
            const scene = parsedScenes[e.id];
            return scene ? `${scene.name}（${e.error}）` : `场景${e.id}（${e.error}）`;
        }).join('\n');
        alert(`批量生成完成！成功 ${successes.length}/${total}，失败 ${errors.length} 个：\n${errorNames}`);
    } else {
        alert(`批量生成完成！全部 ${total} 个场景生成成功`);
    }
}

// =============================================
// 图片选中模式
// =============================================
function selectSceneImage(sceneIndex, card) {
    const col2 = document.getElementById(`scene-col2-${sceneIndex}`);
    if (!col2) return;
    // 取消同行所有选中
    col2.querySelectorAll('.scene-img-card').forEach(c => {
        c.classList.remove('scene-selected-img');
        const img = c.querySelector('img');
        if (img) {
            img.classList.remove('border-[#ff5e00]', 'shadow-[0_0_12px_rgba(255,94,0,0.5)]');
            img.classList.add('border-orange-900/30');
        }
    });
    // 选中当前
    card.classList.add('scene-selected-img');
    const img = card.querySelector('img');
    if (img) {
        img.classList.add('border-[#ff5e00]', 'shadow-[0_0_12px_rgba(255,94,0,0.5)]');
        img.classList.remove('border-orange-900/30');
    }
}

function getSelectedSceneImageUrl(sceneIndex) {
    const col2 = document.getElementById(`scene-col2-${sceneIndex}`);
    if (!col2) return null;
    const selected = col2.querySelector('.scene-selected-img');
    if (selected) return selected.dataset.imgUrl;
    // fallback: 最后一张
    const cards = col2.querySelectorAll('.scene-img-card');
    if (cards.length > 0) return cards[cards.length - 1].dataset.imgUrl;
    return null;
}
// =============================================
// 删除场景图片
// =============================================
function deleteSceneImage(sceneIndex, cardEl) {
    if (!cardEl) return;
    const imgUrl = cardEl.dataset.imgUrl;
    // 从数据数组中移除
    if (sceneGeneratedImages[sceneIndex]) {
        sceneGeneratedImages[sceneIndex] = sceneGeneratedImages[sceneIndex].filter(u => u !== imgUrl);
    }
    // 检查是否是当前选中的
    const wasSelected = cardEl.classList.contains('scene-selected-img');
    // 从DOM移除
    cardEl.remove();
    // 如果删的是选中的，自动选中最后一张
    if (wasSelected) {
        const col2 = document.getElementById(`scene-col2-${sceneIndex}`);
        if (col2) {
            const remaining = col2.querySelectorAll('.scene-img-card');
            if (remaining.length > 0) {
                selectSceneImage(sceneIndex, remaining[remaining.length - 1]);
            }
        }
    }
    // 重置重新生成按钮的冷却状态
    const regenBtn = document.getElementById(`scene-regen-btn-${sceneIndex}`);
    if (regenBtn) {
        regenBtn.disabled = false;
        regenBtn.classList.remove('opacity-40', 'cursor-not-allowed');
        regenBtn.textContent = '🔄 重新生成';
    }
    // 重置原始生成按钮状态
    const genBtn = document.getElementById(`scene-gen-btn-${sceneIndex}`);
    if (genBtn) {
        genBtn.disabled = false;
        genBtn.classList.remove('opacity-60', 'cursor-not-allowed');
        genBtn.textContent = '生成场景';
    }
    // 更新 sessionStorage
    if (typeof saveToSession === 'function') saveToSession();
}

// =============================================
// 一键生成多角度
// =============================================
async function startMultiAngle(sceneIndex) {
    const scene = parsedScenes[sceneIndex];
    if (!scene) return;

    // 使用选中的图片作为参考
    const selectedImageUrl = getSelectedSceneImageUrl(sceneIndex);
    if (!selectedImageUrl) {
        alert('请先生成或上传场景图片，再生成多角度视角');
        return;
    }

    // 风格确认
    if (!window.sceneStyleConfirmed) {
        if (!confirm(`当前风格预设为：${window.currentSceneStyleLabel || '未选择'}\n确定使用此风格生成多角度图片吗？`)) return;
        window.sceneStyleConfirmed = true;
    }

    // 获取第3列容器
    const grid = document.getElementById(`scene-multiangle-${sceneIndex}`);
    if (!grid) return;

    // 重置6个卡片为“生成中”
    grid.innerHTML = MULTI_ANGLE_PROMPTS.map((p, i) => `
        <div id="ma-slot-${sceneIndex}-${i}" class="bg-[#0d0605] border border-orange-600/30 flex items-center justify-center relative aspect-video h-[130px]">
            <span class="text-[9px] text-orange-500 font-bold animate-pulse">⏳ ${p.label}...</span>
        </div>
    `).join('');

    // 并行发送6个请求
    const stylePrompt = window.currentSceneStylePrompt || '';
    const promises = MULTI_ANGLE_PROMPTS.map(async (angleData, i) => {
        const fullPrompt = stylePrompt ? stylePrompt + '。' + angleData.prompt : angleData.prompt;
        try {
            const res = await fetch(`${SCENE_API_BASE}/generate-scene-edit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    imageUrl: selectedImageUrl,
                    prompt: fullPrompt,
                    apiKey: getApiKey(),
                    aspect_ratio: currentAspectRatio
                })
            });
            const data = await res.json();
            if (data.success && data.imageUrl) {
                renderMultiAngleResult(sceneIndex, i, data.imageUrl, angleData.label);
            } else {
                renderMultiAngleError(sceneIndex, i, angleData.label);
            }
        } catch (err) {
            console.error(`多角度[${angleData.label}]错误:`, err);
            renderMultiAngleError(sceneIndex, i, angleData.label);
        }
    });

    await Promise.allSettled(promises);
}

// =============================================
// 一键生成全部多维度视角
// =============================================
async function batchMultiAngleAll() {
    if (!parsedScenes || parsedScenes.length === 0) {
        alert('请先上传场景设定');
        return;
    }

    // 找出所有已生成图片的场景
    const scenesWithImages = [];
    for (let i = 0; i < parsedScenes.length; i++) {
        const col2 = document.getElementById(`scene-col2-${i}`);
        const strip = col2 ? col2.querySelector('.scene-image-strip') : null;
        const imgs = strip ? Array.from(strip.querySelectorAll('img')) : [];
        const selectedUrl = getSelectedSceneImageUrl(i);
        if (selectedUrl) {
            scenesWithImages.push({ index: i, imageUrl: selectedUrl });
        }
    }

    if (scenesWithImages.length === 0) {
        alert('没有已生成图片的场景，请先生成场景图片');
        return;
    }

    if (!confirm(`将为 ${scenesWithImages.length} 个已生成图片的场景生成多维度视角（共 ${scenesWithImages.length * 6} 张图片）\n确定继续吗？`)) return;

    // 风格确认
    if (!window.sceneStyleConfirmed) {
        if (!confirm(`当前风格预设为：${window.currentSceneStyleLabel || '未选择'}\n确定使用此风格生成吗？`)) return;
        window.sceneStyleConfirmed = true;
    }

    const stylePrompt = window.currentSceneStylePrompt || '';

    // 逐个场景处理（每个场景6张并行）
    for (const { index: sceneIndex, imageUrl } of scenesWithImages) {
        const grid = document.getElementById(`scene-multiangle-${sceneIndex}`);
        if (!grid) continue;

        grid.innerHTML = MULTI_ANGLE_PROMPTS.map((p, i) => `
            <div id="ma-slot-${sceneIndex}-${i}" class="bg-[#0d0605] border border-orange-600/30 flex items-center justify-center relative aspect-video h-[130px]">
                <span class="text-[9px] text-orange-500 font-bold animate-pulse">⏳ ${p.label}...</span>
            </div>
        `).join('');

        const promises = MULTI_ANGLE_PROMPTS.map(async (angleData, i) => {
            const fullPrompt = stylePrompt ? stylePrompt + '。' + angleData.prompt : angleData.prompt;
            try {
                const res = await fetch(`${SCENE_API_BASE}/generate-scene-edit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        imageUrl: imageUrl,
                        prompt: fullPrompt,
                        apiKey: getApiKey(),
                        aspect_ratio: currentAspectRatio
                    })
                });
                const data = await res.json();
                if (data.success && data.imageUrl) {
                    renderMultiAngleResult(sceneIndex, i, data.imageUrl, angleData.label);
                } else {
                    renderMultiAngleError(sceneIndex, i, angleData.label);
                }
            } catch (err) {
                renderMultiAngleError(sceneIndex, i, angleData.label);
            }
        });

        await Promise.allSettled(promises);
    }

    alert(`全部多维度视角生成完成！共处理 ${scenesWithImages.length} 个场景`);
}

// =============================================
// 图片选择弹窗

function showImageSelectModal(imageUrls, sceneName) {
    return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'fixed inset-0 bg-black/90 z-[200] flex items-center justify-center';
        overlay.innerHTML = `
            <div class="bg-[#0d0605] border border-orange-900/40 p-4 max-w-[80vw] max-h-[80vh] overflow-auto" onclick="event.stopPropagation()">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[11px] font-bold text-orange-400">选择一张「${sceneName}」的图片作为多角度参考</span>
                    <button class="text-orange-600 hover:text-white text-lg" onclick="this.closest('.fixed').remove()">&times;</button>
                </div>
                <div class="flex gap-3 flex-wrap">
                    ${imageUrls.map((url, i) => `
                        <div class="cursor-pointer border-2 border-transparent hover:border-[#ff5e00] transition-all select-img-card" data-url="${url}">
                            <img src="${url}" class="h-[180px] w-auto object-contain" />
                        </div>
                    `).join('')}
                </div>
            </div>`;

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) { overlay.remove(); resolve(null); }
        });

        overlay.querySelectorAll('.select-img-card').forEach(card => {
            card.addEventListener('click', () => {
                overlay.remove();
                resolve(card.dataset.url);
            });
        });

        document.body.appendChild(overlay);
    });
}

// =============================================
// 渲染多角度结果
// =============================================
function renderMultiAngleResult(sceneIndex, slotIndex, imageUrl, label) {
    const slot = document.getElementById(`ma-slot-${sceneIndex}-${slotIndex}`);
    if (!slot) return;

    slot.className = 'relative overflow-hidden aspect-video h-[130px] group';
    slot.innerHTML = `
        <img src="${imageUrl}" alt="${label}" class="w-full h-full object-cover cursor-pointer" onclick="openImagePreviewSimple('${imageUrl}', '${label}', ${sceneIndex}, ${slotIndex})" />
        <div class="absolute top-1 left-1 px-1.5 py-0.5 bg-black/80 text-[10px] text-orange-300 font-bold">${label}</div>
        <div class="absolute bottom-1 right-1 flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
            <button onclick="event.stopPropagation(); regenerateSingleAngle(${sceneIndex}, ${slotIndex})" class="px-1.5 py-0.5 bg-black/80 text-orange-400 text-[8px] font-bold hover:bg-orange-600 hover:text-white transition-all">🔄</button>
            <a href="${imageUrl}" download="${label}.png" class="px-1.5 py-0.5 bg-black/80 text-orange-400 text-[8px] font-bold hover:bg-orange-600 hover:text-white transition-all" onclick="event.stopPropagation()">⬇</a>
        </div>`;

    // 存储多角度结果
    if (!sceneMultiAngleImages[sceneIndex]) sceneMultiAngleImages[sceneIndex] = {};
    sceneMultiAngleImages[sceneIndex][slotIndex] = imageUrl;
    saveSceneState();

    // hover放大效果 - 使用浮动预览层
    const img = slot.querySelector('img');
    img.addEventListener('mouseenter', (e) => {
        const preview = document.createElement('div');
        preview.id = 'ma-hover-preview';
        preview.className = 'fixed z-[100] pointer-events-none';
        preview.innerHTML = `<img src="${imageUrl}" class="w-[720px] h-auto object-contain border border-orange-600/60 shadow-2xl" />`;
        // 定位在鼠标上方
        const rect = img.getBoundingClientRect();
        preview.style.left = rect.left + 'px';
        preview.style.top = Math.max(10, rect.top - 220) + 'px';
        document.body.appendChild(preview);
    });
    img.addEventListener('mouseleave', () => {
        const p = document.getElementById('ma-hover-preview');
        if (p) p.remove();
    });
}

function renderMultiAngleError(sceneIndex, slotIndex, label) {
    const slot = document.getElementById(`ma-slot-${sceneIndex}-${slotIndex}`);
    if (!slot) return;
    slot.innerHTML = `<span class="text-[8px] text-red-500 font-bold">❌ ${label} 失败</span>`;
}

// =============================================
// 单独重新生成某个多角度视角
// =============================================
async function regenerateSingleAngle(sceneIndex, slotIndex) {
    const scene = parsedScenes[sceneIndex];
    if (!scene) return;

    const angleData = MULTI_ANGLE_PROMPTS[slotIndex];
    if (!angleData) return;

    // 获取选中的源图片
    const sourceImageUrl = getSelectedSceneImageUrl(sceneIndex);
    if (!sourceImageUrl) {
        alert('请先生成或上传场景图片');
        return;
    }

    // 显示加载状态
    const slot = document.getElementById(`ma-slot-${sceneIndex}-${slotIndex}`);
    if (slot) {
        slot.className = 'bg-[#0d0605] border border-orange-600/30 flex items-center justify-center relative aspect-video h-[130px]';
        slot.innerHTML = `<span class="text-[9px] text-orange-500 font-bold animate-pulse">⏳ ${angleData.label}...</span>`;
    }

    const stylePrompt = window.currentSceneStylePrompt || '';
    const fullPrompt = stylePrompt ? stylePrompt + '。' + angleData.prompt : angleData.prompt;

    try {
        const res = await fetch(`${SCENE_API_BASE}/generate-scene-edit`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                imageUrl: sourceImageUrl,
                prompt: fullPrompt,
                apiKey: getApiKey(),
                aspect_ratio: currentAspectRatio
            })
        });
        const data = await res.json();
        if (data.success && data.imageUrl) {
            renderMultiAngleResult(sceneIndex, slotIndex, data.imageUrl, angleData.label);
        } else {
            renderMultiAngleError(sceneIndex, slotIndex, angleData.label);
        }
    } catch (err) {
        renderMultiAngleError(sceneIndex, slotIndex, angleData.label);
    }

    // 关闭全屏预览（如果在全屏中点击了重新生成）
    const overlay = document.getElementById('simple-preview-overlay');
    if (overlay) overlay.remove();
}

// =============================================
// 简单图片预览（全屏）
// =============================================
function openImagePreviewSimple(url, label, sceneIndex, slotIndex) {
    const overlay = document.createElement('div');
    overlay.id = 'simple-preview-overlay';
    overlay.className = 'fixed inset-0 bg-black/95 z-[200] flex items-center justify-center cursor-pointer';
    overlay.onclick = () => overlay.remove();

    const hasRegen = (sceneIndex !== undefined && slotIndex !== undefined);
    const regenBtn = hasRegen
        ? `<button onclick="event.stopPropagation(); regenerateSingleAngle(${sceneIndex}, ${slotIndex})" class="absolute bottom-2 left-2 px-3 py-1.5 bg-orange-700 text-white text-xs font-bold hover:bg-orange-500 transition-all">🔄 重新生成</button>`
        : '';

    overlay.innerHTML = `
        <div class="max-w-[90vw] max-h-[90vh] relative" onclick="event.stopPropagation()">
            <img src="${url}" alt="${label}" class="max-w-full max-h-[85vh] object-contain" />
            <div class="absolute top-2 left-2 px-2 py-1 bg-black/70 text-orange-400 text-xs font-bold">${label}</div>
            <a href="${url}" download="${label}.png" class="absolute bottom-2 right-2 px-3 py-1.5 bg-[#ff5e00] text-white text-xs font-bold hover:bg-orange-500 transition-all">⬇ 下载图片</a>
            ${regenBtn}
            <button onclick="this.closest('.fixed').remove()" class="absolute top-2 right-2 text-orange-600 hover:text-white text-lg">&times;</button>
        </div>`;
    document.body.appendChild(overlay);
}

// =============================================
// 全局图片悬浮预览
// =============================================
(function() {
    const box = document.getElementById('hover-preview-box');
    const previewImg = document.getElementById('hover-preview-img');
    if (!box || !previewImg) return;

    let isShowing = false;

    function hidePreview() {
        isShowing = false;
        box.classList.remove('visible');
    }

    document.addEventListener('mouseover', (e) => {
        const img = e.target.closest('img');
        if (!img) return;
        // 跳过 header、弹窗、预览框自身
        if (img.closest('header') || img.closest('#upload-modal') || img.closest('#hover-preview-box')) return;
        // 跳过 lightbox 覆盖层中的图片
        if (img.closest('.fixed.inset-0') || img.closest('[onclick*="this.closest"]')) return;
        const src = img.src;
        if (!src || src.includes('data:') || img.naturalWidth < 20) return;

        previewImg.src = src;
        isShowing = true;
        box.classList.add('visible');
    });

    document.addEventListener('mousemove', (e) => {
        if (!isShowing) return;
        const x = e.clientX;
        const y = e.clientY;
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        let left = x + 20;
        let top = y - 60;
        if (left + 510 > vw) left = x - 520;
        if (top + 510 > vh) top = vh - 520;
        if (top < 10) top = 10;
        if (left < 10) left = 10;

        box.style.left = left + 'px';
        box.style.top = top + 'px';
    });

    document.addEventListener('mouseout', (e) => {
        const img = e.target.closest('img');
        if (!img) return;
        hidePreview();
    });

    // 点击时立即隐藏预览（避免和 lightbox 重叠）
    document.addEventListener('click', () => {
        hidePreview();
    });
})();
</script>
