<script>
// =============================================
// 一次性清理缓存（版本重置）
// =============================================
(function cleanCacheOnce() {
    const CACHE_VERSION = 'cache_cleared_v1.0';
    if (!localStorage.getItem(CACHE_VERSION)) {
        // 清除所有已保存的 API Key
        ['zhenzhen_api_key', 'zhenzhen-api-key', 'sd-api-key', 'api-key-selector'].forEach(k => localStorage.removeItem(k));
        // 清除已导入的角色设定和图片状态
        ['char_forge_state', 'char_forge_state_images'].forEach(k => localStorage.removeItem(k));
        // 清除场景设定缓存
        ['scene_parsedScenes', 'scene_generatedImages', 'scene_generatedPrompts', 'scene_multiAngleImages', 'scene_stylePreset', 'scene_aspectRatio'].forEach(k => localStorage.removeItem(k));
        localStorage.setItem(CACHE_VERSION, '1');
        console.log('🧹 已清理旧版缓存');
    }
})();

// =============================================
// 全局状态
// =============================================
const API_BASE = 'http://localhost:3115/api';
const IMAGES_SERVER = 'http://localhost:3115';
let parsedCharacters = [];
// 每个角色的选择状态 { charIndex: { face: {image}, hair: {image, prompt}, clothes: {image, prompt} } }
let charStates = {};
// 当前打开的选择面板
let activeSelectorPanel = null;

// =============================================
// 古装短剧光影模式
// =============================================
let dramaLightingEnabled = false;
const DRAMA_LIGHTING_PROMPT = '人物皮肤真实，发丝根根分明，光影过渡极其柔和，配合暖金色光影朦胧背景，营造出强烈的\"仙侠感\"和\"梦境感\"，注意人物脸部比例协调，不要让人物脸部看起来很\"短\"和\"圆\"。';
function toggleDramaLighting() {
    dramaLightingEnabled = !dramaLightingEnabled;
    const btn = document.getElementById('btn-drama-lighting');
    if (btn) {
        if (dramaLightingEnabled) {
            btn.className = 'flex-1 py-3 text-[11px] bg-[#ff5e00] text-white border border-[#ff5e00] transition-all font-bold flex items-center justify-center gap-1';
            btn.style.boxShadow = '0 0 20px rgba(255,94,0,0.5)';
        } else {
            btn.className = 'flex-1 py-3 text-[11px] bg-orange-950/30 text-orange-400 border border-orange-600/40 hover:bg-orange-600 hover:text-white transition-all font-bold flex items-center justify-center gap-1';
            btn.style.boxShadow = '';
        }
    }
    console.log(`🎬 古装短剧光影模式: ${dramaLightingEnabled ? '开启' : '关闭'}`);
}
function getDramaLightingPrompt() {
    return dramaLightingEnabled ? DRAMA_LIGHTING_PROMPT : '';
}

// 图片选择切换
function toggleImageSelect(e) {
    e.stopPropagation();
    const cb = e.target;
    const card = cb.closest('[data-generated-result="true"]') || cb.closest('.group') || cb.closest('[class*="relative"]');
    const resultsDiv = cb.closest('[id^="results-"]');
    const threeViewCol = cb.closest('[id^="three-view-col-"]');

    if (resultsDiv && cb.checked) {
        resultsDiv.querySelectorAll('.img-select-cb').forEach(otherCb => {
            if (otherCb !== cb) otherCb.checked = false;
        });
        resultsDiv.querySelectorAll('.img-selected').forEach(el => {
            if (el !== card) el.classList.remove('img-selected');
        });
        resultsDiv.querySelectorAll('[data-generated-result="true"][data-preferred-result="true"]').forEach(el => {
            delete el.dataset.preferredResult;
        });
    }

    if (threeViewCol && cb.checked) {
        threeViewCol.querySelectorAll('.img-select-cb').forEach(otherCb => {
            if (otherCb !== cb) otherCb.checked = false;
        });
        threeViewCol.querySelectorAll('.img-selected').forEach(el => {
            if (el !== card) el.classList.remove('img-selected');
        });
    }

    if (card) {
        if (cb.checked) card.classList.add('img-selected');
        else card.classList.remove('img-selected');
    }

    if (resultsDiv) {
        const match = resultsDiv.id.match(/^results-(\d+)$/);
        const charIndex = match ? parseInt(match[1], 10) : -1;
        if (charIndex >= 0 && card?.dataset.generatedResult === 'true') {
            if (cb.checked) {
                card.dataset.preferredResult = 'true';
                setPreferredGeneratedResult(charIndex, card.querySelector('img')?.src || '');
            } else {
                delete card.dataset.preferredResult;
                const stillChecked = resultsDiv.querySelector('[data-generated-result="true"] .img-select-cb:checked');
                if (!stillChecked) setPreferredGeneratedResult(charIndex, '');
            }
            logGeneratedResultDebug(charIndex, `toggleImageSelect:${cb.checked ? 'checked' : 'unchecked'}`);
        }
    }
    saveCharacterState();
}

function normalizeImageUrlForCompare(url = '') {
    return decodeURIComponent(String(url || '').split('?')[0])
        .replace(/^https?:\/\/[^/]+/i, '')
        .replace(/\\/g, '/')
        .toLowerCase();
}

function sanitizeDebugName(value = '') {
    return String(value || '')
        .trim()
        .replace(/[^\w\u4e00-\u9fa5.-]+/g, '_')
        .replace(/^_+|_+$/g, '') || 'debug';
}

function isAnimeLibraryImageUrl(url = '') {
    return /\/images\/(?:男性|女性)\/半身图\/二次元/.test(normalizeImageUrlForCompare(url));
}

function markLegacyGeneratedResultCards(resultsDiv) {
    if (!resultsDiv) return;
    resultsDiv.querySelectorAll('.flex-shrink-0').forEach(wrapper => {
        const img = wrapper.querySelector('img');
        const card = wrapper.querySelector('.group.relative');
        const isStandaloneMatch = wrapper.classList.contains('anime-face-match-card')
            || wrapper.dataset.standaloneMatch === 'true'
            || isAnimeLibraryImageUrl(img?.src || '');
        if (isStandaloneMatch) {
            if (card?.dataset.generatedResult === 'true') {
                delete card.dataset.generatedResult;
            }
            return;
        }

        const hasGenerateBtn = [...wrapper.querySelectorAll('button')].some(btn => btn.textContent.includes('生成三视图'));
        if (!hasGenerateBtn) return;
        if (card && !card.dataset.generatedResult) {
            card.dataset.generatedResult = 'true';
        }
    });
}

function ensureCharState(charIndex) {
    if (!charStates[charIndex]) {
        charStates[charIndex] = { face: {}, hair: {}, clothes: {} };
    }
    return charStates[charIndex];
}

function setPreferredGeneratedResult(charIndex, imageUrl = '') {
    const state = ensureCharState(charIndex);
    if (imageUrl) state.preferredGeneratedResult = imageUrl;
    else delete state.preferredGeneratedResult;
}

function getPreferredGeneratedResultCard(charIndex) {
    const resultsDiv = document.getElementById(`results-${charIndex}`);
    if (!resultsDiv) return null;

    markLegacyGeneratedResultCards(resultsDiv);
    const generatedCards = [...resultsDiv.querySelectorAll('[data-generated-result="true"]')];
    if (generatedCards.length === 0) return null;

    const preferredUrl = normalizeImageUrlForCompare(charStates[charIndex]?.preferredGeneratedResult || '');
    if (!preferredUrl) return null;

    return generatedCards.find(card => {
        const img = card.querySelector('img');
        return img && normalizeImageUrlForCompare(img.src) === preferredUrl;
    }) || null;
}

function getGeneratedResultDebugSnapshot(charIndex) {
    const resultsDiv = document.getElementById(`results-${charIndex}`);
    if (!resultsDiv) return [];

    markLegacyGeneratedResultCards(resultsDiv);
    return [...resultsDiv.querySelectorAll('[data-generated-result="true"]')].map((card, index) => {
        const img = card.querySelector('img');
        const cb = card.querySelector('.img-select-cb');
        return {
            index,
            url: img?.src || '',
            normalizedUrl: normalizeImageUrlForCompare(img?.src || ''),
            checked: !!cb?.checked,
            preferred: card.dataset.preferredResult === 'true',
            selectedClass: card.classList.contains('img-selected')
        };
    });
}

function getAllResultImageDebugSnapshot(charIndex) {
    const resultsDiv = document.getElementById(`results-${charIndex}`);
    if (!resultsDiv) return [];

    return [...resultsDiv.querySelectorAll('img')].map((img, index) => {
        const card = img.closest('.group') || img.closest('[class*="relative"]');
        const cb = card?.querySelector('.img-select-cb');
        return {
            index,
            url: img.src || '',
            normalizedUrl: normalizeImageUrlForCompare(img.src || ''),
            checked: !!cb?.checked,
            generated: card?.dataset.generatedResult === 'true',
            preferred: card?.dataset.preferredResult === 'true',
            selectedClass: !!card?.classList.contains('img-selected')
        };
    });
}

function logGeneratedResultDebug(charIndex, reason) {
    const name = parsedCharacters?.[charIndex]?.name || `角色${charIndex}`;
    const preferredState = charStates?.[charIndex]?.preferredGeneratedResult || '';
    console.log(`[生成结果调试] ${reason} | ${name} (#${charIndex})`, {
        preferredState,
        preferredStateNormalized: normalizeImageUrlForCompare(preferredState),
        generatedCards: getGeneratedResultDebugSnapshot(charIndex),
        allCards: getAllResultImageDebugSnapshot(charIndex)
    });
}

function getSelectedResultImageFromColumn(resultsDiv) {
    if (!resultsDiv) return null;

    const selectedCb = resultsDiv.querySelector('.img-select-cb:checked');
    const selectedCard = selectedCb?.closest('.group') || selectedCb?.closest('[class*="relative"]');
    const selectedImg = selectedCard?.querySelector('img');
    if (selectedImg) return selectedImg;

    return resultsDiv.querySelector('img');
}

function getResultImageSourceMeta(charIndex, imageUrl = '') {
    const resultsDiv = document.getElementById(`results-${charIndex}`);
    if (!resultsDiv || !imageUrl) {
        return {
            sourceType: 'unknown',
            isGeneratedResult: false,
            isStandaloneMatch: false
        };
    }

    markLegacyGeneratedResultCards(resultsDiv);
    const normalizedUrl = normalizeImageUrlForCompare(imageUrl);
    const matchedImg = [...resultsDiv.querySelectorAll('img')].find(img =>
        normalizeImageUrlForCompare(img.src) === normalizedUrl
    );

    if (!matchedImg) {
        return {
            sourceType: isAnimeLibraryImageUrl(imageUrl) ? 'smart-match' : 'unknown',
            isGeneratedResult: false,
            isStandaloneMatch: isAnimeLibraryImageUrl(imageUrl)
        };
    }

    const card = matchedImg.closest('[data-generated-result="true"]')
        || matchedImg.closest('.group')
        || matchedImg.closest('[class*="relative"]');
    const wrapper = card?.closest('.anime-face-match-card')
        || card?.closest('[data-standalone-match="true"]')
        || card?.closest('.flex-shrink-0');
    const isGeneratedResult = card?.dataset.generatedResult === 'true';
    const isStandaloneMatch = !isGeneratedResult && (
        wrapper?.classList.contains('anime-face-match-card')
        || wrapper?.dataset.standaloneMatch === 'true'
        || card?.dataset.matchResult === 'anime-face'
        || isAnimeLibraryImageUrl(matchedImg.src || '')
    );

    return {
        sourceType: isGeneratedResult ? 'generated-result' : (isStandaloneMatch ? 'smart-match' : 'other'),
        isGeneratedResult,
        isStandaloneMatch
    };
}

function applyPreferredGeneratedResultSelection(charIndex) {
    const resultsDiv = document.getElementById(`results-${charIndex}`);
    if (!resultsDiv) return;

    markLegacyGeneratedResultCards(resultsDiv);
    const generatedCards = [...resultsDiv.querySelectorAll('[data-generated-result="true"]')];
    generatedCards.forEach(card => {
        card.classList.remove('img-selected');
        delete card.dataset.preferredResult;
        const cb = card.querySelector('.img-select-cb');
        if (cb) cb.checked = false;
    });

    const preferredCard = getPreferredGeneratedResultCard(charIndex);
    if (!preferredCard) return;

    const cb = preferredCard.querySelector('.img-select-cb');
    if (cb) cb.checked = true;
    preferredCard.classList.add('img-selected');
    preferredCard.dataset.preferredResult = 'true';
    logGeneratedResultDebug(charIndex, 'applyPreferredGeneratedResultSelection');
}

// =============================================
// 角色页面状态持久化 (localStorage)
// =============================================
const CHAR_STORAGE_KEY = 'char_forge_state';

// V2.1 版本迁移：清除旧的三视图缓存（三视图图片已从素材库中移除）
(function migrateV21() {
    const MIGRATION_KEY = 'char_forge_migration_v21';
    if (!localStorage.getItem(MIGRATION_KEY)) {
        localStorage.removeItem(CHAR_STORAGE_KEY + '_images');
        localStorage.setItem(MIGRATION_KEY, Date.now().toString());
        console.log('[V2.1 迁移] 已清除旧版三视图缓存');
    }
})();

function saveCharacterState() {
    try {
        const state = {
            parsedCharacters,
            charStates,
            timestamp: Date.now()
        };
        localStorage.setItem(CHAR_STORAGE_KEY, JSON.stringify(state));

        // 单独保存生成的图片（避免超出单个 key 大小限制）
        const imageState = {};
        parsedCharacters.forEach((ch, i) => {
            const charImages = { results: [], threeViews: [] };
            // 第3列生成结果
            const resultsDiv = document.getElementById(`results-${i}`);
            if (resultsDiv) {
                markLegacyGeneratedResultCards(resultsDiv);
                resultsDiv.querySelectorAll('[data-generated-result="true"] img').forEach(img => {
                    const url = img.src;
                    if (url && !url.includes('placeholder') && !isAnimeLibraryImageUrl(url)) {
                        charImages.results.push(url);
                    }
                });
            }
            // 第4列三视图
            const tvCol = document.getElementById(`three-view-col-${i}`);
            if (tvCol) {
                tvCol.querySelectorAll('.tv-card-wrapper').forEach(wrapper => {
                    const img = wrapper.querySelector('img');
                    if (img && img.src && !img.src.includes('placeholder')) {
                        const type = 'tv';
                        const sourceType = wrapper.dataset.sourceType || 'user';
                        charImages.threeViews.push({ url: img.src, type, sourceType });
                    }
                });
            }
            if (charImages.results.length > 0 || charImages.threeViews.length > 0) {
                imageState[i] = charImages;
            }
        });

        try {
            localStorage.setItem(CHAR_STORAGE_KEY + '_images', JSON.stringify(imageState));
        } catch (imgErr) {
            // 图片数据太大，尝试只保存 URL（过滤掉 base64）
            const urlOnly = {};
            Object.entries(imageState).forEach(([k, v]) => {
                urlOnly[k] = {
                    results: v.results.filter(u => !u.startsWith('data:')),
                    threeViews: v.threeViews.filter(t => !t.url.startsWith('data:'))
                };
            });
            try {
                localStorage.setItem(CHAR_STORAGE_KEY + '_images', JSON.stringify(urlOnly));
            } catch (e2) {
                console.warn('图片状态太大，无法保存:', e2.message);
            }
        }
    } catch (e) {
        console.warn('保存角色状态失败:', e.message);
    }
}

function restoreCharacterState() {
    try {
        const saved = localStorage.getItem(CHAR_STORAGE_KEY);
        if (!saved) return false;
        const state = JSON.parse(saved);
        if (!state.parsedCharacters || state.parsedCharacters.length === 0) return false;
        parsedCharacters = state.parsedCharacters;
        charStates = state.charStates || {};
        // 确保每个角色都有状态
        parsedCharacters.forEach((_, i) => {
            if (!charStates[i]) charStates[i] = { face: {}, hair: {}, clothes: {} };
        });
        // 自动填充服装/发型提示词（从角色描述中提取）
        parsedCharacters.forEach((ch, i) => {
            const s = charStates[i];
            if (!s.clothes.prompt && !s.clothes.image) {
                const cp = ch.clothingPrompt || extractClothingPrompt(ch.prompt || '');
                if (cp) s.clothes.prompt = cp;
            }
            if (!s.hair.prompt && !s.hair.image && ch.hair_description) {
                s.hair.prompt = ch.hair_description;
            }
        });
        renderAllCharacterRows(parsedCharacters);
        // 恢复所有部件预览
        parsedCharacters.forEach((_, i) => {
            ['face', 'hair', 'clothes'].forEach(pt => {
                if (charStates[i] && (charStates[i][pt].image || charStates[i][pt].prompt)) {
                    updatePartPreview(i, pt);
                }
            });
            checkCanGenerate(i);
        });
        updateStats(parsedCharacters);

        // 恢复生成的图片
        try {
            const imgSaved = localStorage.getItem(CHAR_STORAGE_KEY + '_images');
            if (imgSaved) {
                const imageState = JSON.parse(imgSaved);
                Object.entries(imageState).forEach(([idx, imgs]) => {
                    const charIndex = parseInt(idx);
                    const charName = parsedCharacters[charIndex]?.name || '角色';
                    // 恢复第3列
                    const savedResults = (imgs.results || []).filter(url => !isAnimeLibraryImageUrl(url));
                    if (savedResults.length > 0) {
                        savedResults.forEach(url => addResultImage(charIndex, url, charName));
                    }
                    // 恢复第4列
                    if (imgs.threeViews && imgs.threeViews.length > 0) {
                        imgs.threeViews.forEach(item => {
                            if (item.type === 'tv') {
                                addToThreeViewCol(charIndex, item.url, charName, {
                                    sourceType: item.sourceType || 'user'
                                });
                            }
                        });
                    }
                });
                console.log('✅ 已恢复生成的图片');
            }
        } catch (imgErr) {
            console.warn('恢复图片状态失败:', imgErr.message);
        }

        console.log(`✅ 已恢复 ${parsedCharacters.length} 个角色的工作状态`);
        return true;
    } catch (e) {
        console.warn('恢复角色状态失败:', e.message);
        return false;
    }
}

function toggleDownloadMenu() {
    const menu = document.getElementById('download-menu');
    if (menu) menu.classList.toggle('hidden');
}
// 点击其他区域关闭菜单
document.addEventListener('click', (e) => {
    const menu = document.getElementById('download-menu');
    if (menu && !menu.classList.contains('hidden') && !e.target.closest('.relative:has(#download-menu)')) {
        menu.classList.add('hidden');
    }
});

async function startBatchDownload() {
    const dlResults = document.getElementById('dl-results')?.checked;
    const dlThreeview = document.getElementById('dl-threeview')?.checked;
    if (!dlResults && !dlThreeview) {
        alert('请至少选择一种图片类型');
        return;
    }

    const urls = [];
    if (!parsedCharacters || parsedCharacters.length === 0) {
        alert('没有角色数据');
        return;
    }

    parsedCharacters.forEach((ch, i) => {
        const charName = ch.name || `角色${i}`;
        // 第3列半身图
        if (dlResults) {
            const resultsDiv = document.getElementById(`results-${i}`);
            if (resultsDiv) {
                markLegacyGeneratedResultCards(resultsDiv);
                resultsDiv.querySelectorAll('[data-generated-result="true"] img').forEach((img, j) => {
                    if (img.src && !img.src.includes('placeholder') && !isAnimeLibraryImageUrl(img.src)) {
                        urls.push({ url: img.src, name: `${charName}_半身图_${j + 1}`, type: 'result' });
                    }
                });
            }
        }
        // 第4列
        const tvCol = document.getElementById(`three-view-col-${i}`);
        if (tvCol) {
            tvCol.querySelectorAll('.tv-card-wrapper').forEach((wrapper, j) => {
                const img = wrapper.querySelector('img');
                if (!img || !img.src) return;
                if (dlThreeview) {
                    urls.push({ url: img.src, name: `${charName}_三视图_${j + 1}`, type: 'tv' });
                }
            });
        }
    });

    if (urls.length === 0) {
        alert('没有找到可下载的图片');
        return;
    }

    // 关闭菜单
    document.getElementById('download-menu')?.classList.add('hidden');

    // 用 JSZip 打包
    const zip = new JSZip();
    const totalCount = urls.length;
    let doneCount = 0;
    const downloadBtn = document.querySelector('#download-menu + button, [onclick*="toggleDownloadMenu"]');
    const origText = downloadBtn?.textContent;
    if (downloadBtn) downloadBtn.textContent = `⬇️ 打包中 0/${totalCount}`;

    for (const item of urls) {
        try {
            const resp = await fetch(item.url);
            const blob = await resp.blob();
            // 确定扩展名
            const ext = '.png';
            // 按类型分目录
            const folder = item.type === 'result' ? '半身图' : '三视图';
            zip.folder(folder).file(`${item.name}${ext}`, blob);
            doneCount++;
            if (downloadBtn) downloadBtn.textContent = `⬇️ 打包中 ${doneCount}/${totalCount}`;
        } catch (e) {
            console.warn('获取图片失败:', item.name, e.message);
            doneCount++;
        }
    }

    if (downloadBtn) downloadBtn.textContent = '⬇️ 生成ZIP中...';
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const zipName = `角色图片_${new Date().toLocaleDateString().replace(/\//g,'-')}.zip`;

    // 通过服务器中转下载（Electron 不支持 blob URL 下载）
    if (downloadBtn) downloadBtn.textContent = '⬇️ 上传到服务器...';
    const uploadRes = await fetch(`/api/download-zip?filename=${encodeURIComponent(zipName)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/octet-stream' },
        body: zipBlob
    });
    const { url: downloadUrl } = await uploadRes.json();
    // 通过隐藏 iframe 触发真正的 HTTP 下载（不离开当前页面）
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = downloadUrl;
    document.body.appendChild(iframe);
    setTimeout(() => iframe.remove(), 10000);

    if (downloadBtn) downloadBtn.textContent = origText || '📥 一键下载';
    alert(`打包完成！共 ${totalCount} 张图片`);
}

// =============================================
// Toast 通知
// =============================================
function showToast(message, type = 'info') {
    const colors = {
        success: 'bg-emerald-600 border-emerald-400',
        error: 'bg-red-700 border-red-400',
        warning: 'bg-yellow-600 border-yellow-400',
        info: 'bg-blue-600 border-blue-400'
    };
    const toast = document.createElement('div');
    toast.className = `fixed bottom-6 right-6 z-[200] px-5 py-3 rounded shadow-lg text-white text-sm font-bold border ${colors[type] || colors.info} transition-all`;
    toast.style.cssText = 'opacity:0; transform:translateY(20px); transition: opacity 0.3s, transform 0.3s;';

}

function getMatchImageIdentity(match) {
    const normalizedUrl = normalizeImageUrlForCompare(match?.url || '');
    if (normalizedUrl) return normalizedUrl;

    const subfolder = String(match?.subfolder || '').toLowerCase();
    const filename = String(match?.filename || '').toLowerCase();
    const baseName = filename.replace(/\.(png|jpe?g|webp|gif)$/i, '');
    return `${subfolder}::${baseName || filename}`;
}

function uniqueMatchImages(matches = []) {
    const seen = new Set();
    const unique = [];

    matches.forEach(match => {
        const key = getMatchImageIdentity(match);
        if (seen.has(key)) return;
        seen.add(key);
        unique.push(match);
    });

    return unique;
}

function detectGender(prompt) {
    const maleKw = ['男性', '男子', '男人', '少年', '男孩', '老翁', '大叔', '壮汉', '青年男', '中年男', '老年男',
        '美男', '帅哥', '英俊', '僧人', '和尚', '老僧', '方丈', '矿工', '壮士', '绝世美男', '俊美',
        '年轻男', '老年男', '英武', '魁梧', '老者形象', '老者', '老人'];
    const femaleKw = ['女性', '女子', '女人', '少女', '女孩', '仙女', '美女', '淑女', '青年女', '中年女', '老年女', '萝莉',
        '美人', '妖女', '妖艳', '女修', '小女孩', '女修士', '绝世美女', '红颜', '佳人'];
    const isMale = maleKw.some(kw => prompt.includes(kw));
    const isFemale = femaleKw.some(kw => prompt.includes(kw));
    if (isMale && !isFemale) return 'male';
    if (isFemale && !isMale) return 'female';
    // 有歧义时（如"成年男女"）返回 unknown，由用户手动选择
    if (isMale && isFemale) return 'unknown';
    return 'unknown';
}

// =============================================
// 从角色提示词中提取服装描述
// =============================================
function extractClothingPrompt(rawPrompt) {
    if (!rawPrompt) return '';
    // 匹配 身着/身穿/穿着/身披 开头的服装描述
    const startPattern = /(身着|身穿|穿着|身披)/;
    const startMatch = rawPrompt.match(startPattern);
    if (!startMatch) return '';
    const startIdx = startMatch.index;
    // 从起始词到句末提取，然后按终止词截断
    const afterStart = rawPrompt.substring(startIdx);
    // 终止词：遇到非服装描述内容时截断
    const stopPatterns = [
        /电影级/, /光影采用/, /光影从/, /光影极度/, /光影压抑/, /光影呈现/,
        /光线/, /背景虚化/, /纯白背景/, /简单纯白/, /简单的纯白/,
        /头发/, /发型为/, /发丝/, /发髻/,
        /眼神/, /神情/, /面容/, /五官/, /皮肤呈/,
        /国漫/, /新中式/, /标准修仙/,
        /Medium shot/
    ];
    // 先按句号分段，保留服装相关的句子
    const sentences = afterStart.split(/(?<=。)/);
    let result = '';
    for (const sentence of sentences) {
        // 检查是否包含终止词
        let shouldStop = false;
        for (const pat of stopPatterns) {
            if (pat.test(sentence)) { shouldStop = true; break; }
        }
        if (shouldStop) break;
        result += sentence;
    }
    return result.replace(/。$/, '').trim();
}

// =============================================
// 解析角色生图提示词
// =============================================
/**
 * 从角色描述中提取年龄、发型、面部特征
 */
function extractCharacterFeatures(prompt) {
    const features = { age: '', hair_description: '', face_description: '' };

    // 提取年龄描述
    const agePatterns = [
        /约([一二三四五六七八九十百\d]+[多余]?岁)/,
        /([一二三四五六七八九十百\d]+[多余]?岁)/,
        /(年轻|年幼|少女|少年|青年|中年|老年|老者|幼年|年约[^，。]+)/,
        /(十[一二三四五六七八九]?[岁]?左右|二十[一二三四五六七八九]?[岁])/,
    ];
    for (const p of agePatterns) {
        const m = prompt.match(p);
        if (m) { features.age = m[1] || m[0]; break; }
    }

    // 提取发型描述（发/髻/辫/马尾/刘海 相关句子片段）
    const hairMatch = prompt.match(/([^。，]*(?:发[型丝髻]|头发|长发|短发|卷发|直发|马尾|双马尾|丸子头|编发|盘发|双丫髻|羊角辫|麻花辫|光头|白发|黑发|银发|金发|红发|蓝发|紫发|绿发|棕发|发丝|刘海|发冠|发簪|木簪|玉簪|步摇|高马尾|束发|散落|凌乱|披肩)[^。]*)/g);
    if (hairMatch) {
        features.hair_description = hairMatch.join('，').substring(0, 200);
    }

    // 提取面部特征
    const faceMatch = prompt.match(/([^。，]*(?:面容|五官|脸|圆脸|鹅蛋脸|瓜子脸|方脸|长脸|心形脸|菱形脸|眼[神睛]|大眼|凤眼|丹凤眼|剑眉|英俊|帅气|美丽|可爱|精致|清秀|俊美|冷峻|温柔|阴鸷|妖艳|白皙|苍白|皮肤|面色|颧骨|眉[心宇间])[^。]*)/g);
    if (faceMatch) {
        features.face_description = faceMatch.join('，').substring(0, 200);
    }

    return features;
}

function parseCharactersFromText(text) {
    const lines = text.split('\n');
    const characters = [];
    let inSection = false;
    for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed === '角色生图提示词：') { inSection = true; continue; }
        if (inSection) {
            if (!trimmed || /^(角色配音提示词|空间|道具\/特效)/.test(trimmed)) break;
            const match = trimmed.match(/^(.+?)（(\d+)次\/(\d+)）：(.+)$/);
            if (match) {
                const prompt = match[4];
                const clothingPrompt = extractClothingPrompt(prompt);
                const features = extractCharacterFeatures(prompt);
                characters.push({
                    name: match[1], count: parseInt(match[2]), episode: match[3],
                    rawBracket: `${match[2]}次/${match[3]}`,
                    prompt, gender: detectGender(prompt),
                    clothingPrompt,
                    age: features.age,
                    hair_description: features.hair_description,
                    face_description: features.face_description
                });
            }
        }
    }
    return characters;
}

// =============================================
// 智能文件夹匹配
// =============================================
function assignPreferredFolders(characters) {
    // 颜值关键词：包含这些词的角色优先从主角文件夹匹配
    const beautyKeywords = /极度英俊|英俊|俊美|帅气|潇洒|极度美丽|美丽|绝美|倾国倾城|极度坚毅帅气|极度冷艳|极度妩媚|俊朗|清秀|精致|极度精致/;

    // 按性别分组
    const females = characters.filter(c => c.gender === 'female');
    const males = characters.filter(c => c.gender === 'male');

    // 中老年关键词：包含这些词的配角角色优先从中老年配角文件夹匹配
    const elderKeywords = /中老年|中年|老年|老者|老人|老翁|大叔|老妇|老太|四十多岁|五十多岁|六十多岁|七十多岁|年过[四五六七]|[四五六七]旬|[四五六七]十[一二三四五六七八九]?岁/;

    // 女性：颜值关键词 → 亚洲青年女主演脸部，中老年 → 中老年配角，否则最高次数 → 主角，其余 → 配角
    if (females.length > 0) {
        const maxCount = Math.max(...females.map(c => c.count));
        const leadFemaleIdx = females.findIndex(c => c.count === maxCount);
        females.forEach((c, i) => {
            if (beautyKeywords.test(c.prompt || '')) {
                c.preferredFaceSubfolder = '亚洲青年女主演脸部';
            } else if (elderKeywords.test(c.prompt || '') || elderKeywords.test(c.age || '')) {
                c.preferredFaceSubfolder = '亚洲中老年女性配角';
            } else {
                c.preferredFaceSubfolder = (i === leadFemaleIdx) ? '亚洲青年女主演脸部' : '亚洲女配角';
            }
        });
    }

    // 男性：颜值关键词 → 亚洲男主角，中老年 → 中老年配角，否则最高次数 → 主角，其余 → 配角
    if (males.length > 0) {
        const maxCount = Math.max(...males.map(c => c.count));
        const leadMaleIdx = males.findIndex(c => c.count === maxCount);
        males.forEach((c, i) => {
            if (beautyKeywords.test(c.prompt || '')) {
                c.preferredFaceSubfolder = '亚洲男主角';
            } else if (elderKeywords.test(c.prompt || '') || elderKeywords.test(c.age || '')) {
                c.preferredFaceSubfolder = '亚洲中老年男性配角';
            } else {
                c.preferredFaceSubfolder = (i === leadMaleIdx) ? '亚洲男主角' : '亚洲男配角';
            }
        });
    }

    // 未知性别和妖兽不设限制
    characters.filter(c => c.gender === 'unknown' || c.gender === 'monster').forEach(c => {
        c.preferredFaceSubfolder = '';
        c.preferredHairSubfolder = '';
        c.preferredClothesSubfolder = '';
    });

    // 智能匹配发型文件夹
    characters.forEach((c, i) => {
        const p = c.prompt || '';
        if (c.gender === 'female') {
            if (/古装|汉服|古代|仙/.test(p)) {
                // 根据已分配的脸部文件夹判断主角/配角
                const isLead = /主/.test(c.preferredFaceSubfolder || '');
                c.preferredHairSubfolder = isLead ? '古装主角长发' : '古装配角长发';
            }
            else if (/卷发|波浪/.test(p)) c.preferredHairSubfolder = '女性卷发发型';
            else if (/短发/.test(p)) c.preferredHairSubfolder = '黑色女性短发';
            else if (/现代|都市/.test(p)) c.preferredHairSubfolder = '现代长发';
            else c.preferredHairSubfolder = '';
        } else if (c.gender === 'male') {
            if (/古装|汉服|古代|古风|仙/.test(p)) c.preferredHairSubfolder = '古代发型';
            else if (/现代|都市/.test(p)) c.preferredHairSubfolder = '现代发型';
            else c.preferredHairSubfolder = '';
        } else if (c.gender !== 'monster') {
            // unknown 性别也不设限制
            c.preferredHairSubfolder = '';
        }
    });

    // 智能匹配服装文件夹
    characters.forEach(c => {
        if (c.gender === 'monster' || c.gender === 'unknown') return; // 妖兽和未知性别跳过自动匹配
        const p = c.prompt || '';
        if (/古装|古代|汉服|仙|修仙|道袍|长袍/.test(p)) c.preferredClothesSubfolder = '古装';
        else if (/现代|都市|西装|制服|校服|时尚/.test(p)) c.preferredClothesSubfolder = '现代';
        else c.preferredClothesSubfolder = '';
    });
}

function setCharGenderRole(charIndex, gender, role) {
    const char = parsedCharacters[charIndex];
    char.gender = gender;
    // 设置文件夹
    if (gender === 'female') {
        if (role === 'lead') char.preferredFaceSubfolder = '亚洲青年女主演脸部';
        else if (role === 'elder-support') char.preferredFaceSubfolder = '亚洲中老年女性配角';
        else char.preferredFaceSubfolder = '亚洲女配角';
    } else if (gender === 'male') {
        if (role === 'lead') char.preferredFaceSubfolder = '亚洲男主角';
        else if (role === 'elder-support') char.preferredFaceSubfolder = '亚洲中老年男性配角';
        else char.preferredFaceSubfolder = '亚洲男配角';
    } else if (gender === 'monster') {
        char.preferredFaceSubfolder = '';
        char.preferredHairSubfolder = '';
        char.preferredClothesSubfolder = '';
    }
    // 更新名字标签颜色
    const nameEl = document.getElementById(`name-tag-${charIndex}`);
    if (nameEl) {
        nameEl.className = 'text-[11px] font-bold tracking-tighter px-1.5 py-0.5 rounded-sm ' +
            (gender === 'male' ? 'bg-blue-900/40 text-blue-300' : gender === 'monster' ? 'bg-green-900/40 text-green-300' : 'bg-pink-900/40 text-pink-300');
    }
    // 更新选择器按钮文字（保留按钮）
    const selectorBtn = document.getElementById(`gender-selector-${charIndex}`);
    if (selectorBtn) {
        let btnText, btnClass;
        if (gender === 'monster') {
            btnText = '🐉妖兽';
            btnClass = 'px-1.5 py-0.5 text-[9px] border transition-all bg-green-900/30 text-green-300 border-green-700/40 hover:bg-green-600 hover:text-white';
        } else {
            const gSymbol = gender === 'male' ? '♂' : '♀';
            const rLabel = role === 'lead' ? '主' : role === 'elder-support' ? '老配' : '配';
            btnText = gSymbol + rLabel;
            btnClass = 'px-1.5 py-0.5 text-[9px] border transition-all ' +
                (gender === 'male'
                    ? 'bg-blue-900/30 text-blue-300 border-blue-700/40 hover:bg-blue-600 hover:text-white'
                    : 'bg-pink-900/30 text-pink-300 border-pink-700/40 hover:bg-pink-600 hover:text-white');
        }
        selectorBtn.textContent = btnText;
        selectorBtn.className = btnClass;
    }
    // 隐藏下拉
    const dropdown = document.getElementById(`gender-dropdown-${charIndex}`);
    if (dropdown) dropdown.remove();
    saveCharacterState();
}

function toggleGenderDropdown(charIndex) {
    const existing = document.getElementById(`gender-dropdown-${charIndex}`);
    if (existing) { existing.remove(); return; }
    // 移除其他下拉
    document.querySelectorAll('[id^="gender-dropdown-"]').forEach(el => el.remove());

    const btn = document.getElementById(`gender-selector-${charIndex}`);
    const rect = btn.getBoundingClientRect();
    const dd = document.createElement('div');
    dd.id = `gender-dropdown-${charIndex}`;
    dd.className = 'fixed z-[95] bg-[#0d0605] border border-orange-800/60 shadow-[0_0_20px_rgba(255,94,0,0.2)] py-1';
    dd.style.cssText = `left:${rect.left}px; min-width:100px;`;
    dd.innerHTML = `
        <button onclick="setCharGenderRole(${charIndex},'female','lead')" class="block w-full text-left px-3 py-1.5 text-[10px] text-pink-300 hover:bg-pink-900/30">♀ 女主角</button>
        <button onclick="setCharGenderRole(${charIndex},'female','support')" class="block w-full text-left px-3 py-1.5 text-[10px] text-pink-400 hover:bg-pink-900/30">♀ 女配角</button>
        <button onclick="setCharGenderRole(${charIndex},'female','elder-support')" class="block w-full text-left px-3 py-1.5 text-[10px] text-pink-500 hover:bg-pink-900/30">♀ 中老年女配角</button>
        <button onclick="setCharGenderRole(${charIndex},'male','lead')" class="block w-full text-left px-3 py-1.5 text-[10px] text-blue-300 hover:bg-blue-900/30">♂ 男主角</button>
        <button onclick="setCharGenderRole(${charIndex},'male','support')" class="block w-full text-left px-3 py-1.5 text-[10px] text-blue-400 hover:bg-blue-900/30">♂ 男配角</button>
        <button onclick="setCharGenderRole(${charIndex},'male','elder-support')" class="block w-full text-left px-3 py-1.5 text-[10px] text-blue-500 hover:bg-blue-900/30">♂ 中老年男配角</button>
        <div class="border-t border-orange-900/30 my-1"></div>
        <button onclick="setCharGenderRole(${charIndex},'monster','support')" class="block w-full text-left px-3 py-1.5 text-[10px] text-green-300 hover:bg-green-900/30">🐉 妖兽</button>`;
    document.body.appendChild(dd);
    // 确保下拉菜单不超出屏幕
    requestAnimationFrame(() => {
        const ddH = dd.offsetHeight;
        let top = rect.bottom + 4;
        if (top + ddH > window.innerHeight - 10) top = rect.top - ddH - 4;
        if (top < 10) top = 10;
        dd.style.top = top + 'px';
    });
    // 点击外部关闭
    setTimeout(() => {
        const closeHandler = (e) => {
            if (!dd.contains(e.target) && e.target !== btn) { dd.remove(); document.removeEventListener('click', closeHandler); }
        };
        document.addEventListener('click', closeHandler);
    }, 0);
}

// =============================================
// 打开选择面板（搜索+浏览+提示词）
// =============================================
async function openSelector(charIndex, partType, triggerEl) {
    closeSelectorPanel();
    const char = parsedCharacters[charIndex];
    const genderKey = char.gender === 'male' ? 'male' : char.gender === 'monster' ? 'monster' : 'female';
    const state = charStates[charIndex][partType];
    const partNames = genderKey === 'monster'
        ? { face: '妖兽头部', hair: '妖兽头部', clothes: '妖兽服装' }
        : { face: '人脸', hair: '发型', clothes: '服装' };

    // 计算初始文件夹路径（中文文件夹名）
    const genderFolder = genderKey === 'male' ? '男性' : genderKey === 'monster' ? '妖兽' : '女性';
    // 妖兽只有 头/服装 两个文件夹，face和hair都映射到 头
    const partFolder = genderKey === 'monster'
        ? (partType === 'clothes' ? '服装' : '头')
        : (partType === 'face' ? '脸' : partType === 'hair' ? '发型' : '服装');
    const initialBrowsePath = getStyleImageLibraryPath() + '/' + genderFolder + '/' + partFolder;

    // 获取智能匹配的子文件夹名
    const preferredKey = partType === 'face' ? 'preferredFaceSubfolder' : partType === 'hair' ? 'preferredHairSubfolder' : 'preferredClothesSubfolder';
    let preferredSubfolder = char[preferredKey] || '';

    const panel = document.createElement('div');
    panel.id = 'selector-panel';
    panel.className = 'fixed z-[90] bg-[#0d0605] border border-orange-800/60 shadow-[0_0_40px_rgba(255,94,0,0.15)] flex flex-col';
    panel.style.cssText = 'width:380px; max-height:' + (window.innerHeight - 20) + 'px;';

    // 定位
    const rect = triggerEl.getBoundingClientRect();
    const row = triggerEl.closest('.cyber-border') || triggerEl.closest('[class*="h-[320px]"]') || triggerEl.parentElement;
    const rowRect = row ? row.getBoundingClientRect() : rect;
    let left = rect.right + 8;
    if (left + 380 > window.innerWidth - 10) { left = rect.left - 388; }
    if (left < 10) left = Math.max(10, (window.innerWidth - 380) / 2);
    panel.style.left = left + 'px';
    panel.style.visibility = 'hidden';

    // 自动填充：如果服装/发型提示词为空，从角色描述中自动提取
    let currentPrompt = state.prompt || '';
    if (!currentPrompt && char) {
        if (partType === 'clothes') {
            currentPrompt = char.clothingPrompt || extractClothingPrompt(char.prompt || '') || '';
        } else if (partType === 'hair') {
            currentPrompt = char.hair_description || '';
        }
        // 同步写回 state，这样保存时能持久化
        if (currentPrompt) {
            state.prompt = currentPrompt;
            checkCanGenerate(charIndex);
        }
    }
    const showPromptSection = partType !== 'face';

    panel.innerHTML = `
    <div id="sel-titlebar" class="p-3 border-b border-orange-900/40 flex justify-between items-center flex-shrink-0" style="cursor:move; user-select:none;">
        <span class="text-[11px] font-black text-[#ff5e00] uppercase tracking-widest">${char.name} · ${partNames[partType]}</span>
        <div class="flex items-center gap-2">
            <button onclick="refreshSearchForCurrentBrowsePath()" class="text-[9px] text-orange-500 hover:text-[#ff5e00] transition-colors" title="刷新素材库">🔄 刷新</button>
            <button onclick="closeSelectorPanel()" class="text-orange-800 hover:text-orange-400 text-lg leading-none">&times;</button>
        </div>
    </div>
    <!-- 搜索 -->
    <div class="p-3 border-b border-orange-900/30 flex-shrink-0">
        <div class="flex gap-2">
            <input id="sel-search-input" type="text" class="flex-1 bg-[#050302] border border-orange-900/40 text-[11px] text-orange-100 placeholder-orange-700 px-3 py-1.5 focus:ring-[#ff5e00] focus:border-[#ff5e00] rounded-none" placeholder="搜索标签（如: 古装、青年...）" />
            <button onclick="doSearch(${charIndex}, '${partType}', '${genderKey}')" class="px-3 py-1.5 bg-[#ff5e00] text-white text-[10px] font-bold">🔍</button>
        </div>
        <!-- 文件夹浏览按钮 -->
        <div class="mt-2 flex gap-1">
            <button id="sel-folder-btn" onclick="toggleFolderBrowser()" class="flex-1 py-1.5 text-[10px] bg-orange-900/15 hover:bg-orange-900/30 text-orange-400 border border-orange-900/50 transition-all font-bold flex items-center justify-center gap-1">
                📂 <span id="sel-folder-label">${preferredSubfolder || partFolder}</span> ▼
            </button>
        </div>
    </div>
    <!-- 文件夹浏览区（默认隐藏） -->
    <div id="sel-folder-browser" class="hidden border-b border-orange-900/30 flex-shrink-0" style="max-height:200px; overflow-y:auto;"></div>
    <!-- 搜索结果区 -->
    <div id="sel-results" class="flex-1 overflow-y-auto p-3 min-h-[120px]" style="max-height:40vh;">
        <p class="text-[10px] text-orange-900/60 text-center py-4">输入关键词搜索，或留空搜索全部</p>
    </div>
    <!-- 本地浏览 -->
    <div class="p-3 border-t border-orange-900/30 flex-shrink-0">
        <label class="flex items-center gap-2 mb-2 cursor-pointer">
            <input type="checkbox" id="sel-add-to-library" class="w-3 h-3 bg-black border-orange-900/60 text-[#ff5e00] rounded-none" />
            <span class="text-[9px] text-orange-500">同时添加到本地素材库</span>
        </label>
        <input type="file" id="sel-file-input" accept="image/*" class="hidden" onchange="handleLocalFile(event, ${charIndex}, '${partType}')" />
        <button onclick="document.getElementById('sel-file-input').click()" class="w-full py-2 text-[10px] bg-orange-900/15 hover:bg-orange-600 hover:text-white text-orange-500 border border-orange-900/50 transition-all font-bold">
            📁 从本地选择图片
        </button>
    </div>
    ${showPromptSection ? `
    <!-- 提示词 -->
    <div class="p-3 border-t border-orange-900/30 flex-shrink-0">
        <label class="text-[9px] text-orange-700 uppercase tracking-widest block mb-1">✏️ ${partNames[partType]}提示词（可替代图片）</label>
        <textarea id="sel-prompt-input" class="w-full h-16 text-[11px] bg-[#050302] border border-orange-900/40 text-orange-100 placeholder-orange-700 p-2 focus:ring-[#ff5e00] focus:border-[#ff5e00] rounded-none resize-none" placeholder="描述${partNames[partType]}特征...">${currentPrompt}</textarea>
        <button onclick="savePrompt(${charIndex}, '${partType}')" class="mt-1 w-full py-1.5 text-[10px] bg-orange-900/20 hover:bg-orange-600 hover:text-white text-orange-600 border border-orange-900/40 transition-all font-bold">
            保存提示词
        </button>
    </div>` : ''}`;

    document.body.appendChild(panel);
    activeSelectorPanel = panel;

    // 记录数据
    panel.dataset.partType = partType;
    panel.dataset.charIndex = charIndex;
    panel.dataset.genderKey = genderKey;
    panel.dataset.baseLibraryPath = initialBrowsePath;
    if (preferredSubfolder) {
        panel.dataset.browsePath = initialBrowsePath + '/' + preferredSubfolder;
    } else {
        panel.dataset.browsePath = initialBrowsePath;
    }
    panel.dataset.preferredSubfolder = preferredSubfolder;

    // 精确定位
    requestAnimationFrame(() => {
        clampPanelToViewport(panel, rect);
    });

    // 拖拽功能
    initDraggable(panel, panel.querySelector('#sel-titlebar'));

    const folderBrowser = panel.querySelector('#sel-folder-browser');
    if (folderBrowser) {
        folderBrowser.addEventListener('click', (e) => e.stopPropagation());
    }

    // 回车触发搜索
    const searchInput = panel.querySelector('#sel-search-input');
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doSearch(charIndex, partType, genderKey);
    });

    // 动态解析子文件夹
    if (!preferredSubfolder && (partType === 'hair' || partType === 'clothes')) {
        try {
            const folderRes = await fetch(`${API_BASE}/browse-folder`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ folderPath: initialBrowsePath })
            });
            const folderData = await folderRes.json();
            if (folderData.success && folderData.folders.length > 0) {
                preferredSubfolder = folderData.folders[0].name;
                panel.dataset.browsePath = folderData.folders[0].path;
                panel.dataset.preferredSubfolder = preferredSubfolder;
                char[preferredKey] = preferredSubfolder;
                const label = panel.querySelector('#sel-folder-label');
                if (label) label.textContent = preferredSubfolder;
            }
        } catch (e) { /* 查询失败时保持原样 */ }
    }

    // 自动搜索
    doSearch(charIndex, partType, genderKey);
}

// IMAGE_LIBRARY_PATH 从服务器获取
let IMAGE_LIBRARY_PATH = '';
let STYLE_FOLDERS = { 'real': '真人', '2d': '2D', '3d': '3D' };
let DEFAULT_STYLE_CODE = 'real';

// 异步获取实际路径和风格映射
async function initImageLibraryPath() {
    try {
        const settingsRes = await fetch(`${API_BASE}/settings`);
        const settingsData = await settingsRes.json();
        if (settingsData.imageLibraryPath) {
            IMAGE_LIBRARY_PATH = settingsData.imageLibraryPath;
        }
    } catch (e) { /* 回退到 health */ }

    try {
        const healthRes = await fetch(`${API_BASE}/health`);
        const d = await healthRes.json();
        if (!IMAGE_LIBRARY_PATH && d.image_library) IMAGE_LIBRARY_PATH = d.image_library;
        if (d.style_folders) STYLE_FOLDERS = d.style_folders;
        if (d.default_style) DEFAULT_STYLE_CODE = d.default_style;
    } catch (e) {}

    if (!IMAGE_LIBRARY_PATH) {
        console.warn('⚠️ 素材库路径未设置，请配置');
        setTimeout(() => openImageLibrarySettings(), 500);
    }

    updateImageLibraryButtonStatus();
}
initImageLibraryPath();

function updateImageLibraryButtonStatus() {
    const btn = document.getElementById('btn-image-library');
    if (!btn) return;
    if (IMAGE_LIBRARY_PATH) {
        btn.className = 'px-4 py-2 bg-transparent hover:bg-cyan-600/20 text-cyan-400 border border-cyan-600/50 rounded-none text-sm font-bold transition-all flex items-center';
        btn.title = `素材库: ${IMAGE_LIBRARY_PATH}`;
    } else {
        btn.className = 'px-4 py-2 bg-red-900/30 hover:bg-red-600/30 text-red-400 border border-red-500/60 rounded-none text-sm font-bold transition-all flex items-center animate-pulse';

}

    if (modal) modal.classList.remove('hidden');
    document.getElementById('image-library-status')?.classList.add('hidden');
    document.getElementById('folder-style-check')?.classList.add('hidden');

function closeImageLibrarySettings() {
    const modal = document.getElementById('image-library-modal');
    if (modal) modal.classList.add('hidden');
}

// ── 原生文件夹选择 ──────────────────────────────
let _selectedFolderPath = '';

async function openNativeFolderDialog() {
    const statusEl = document.getElementById('image-library-status');
    const btn = document.getElementById('btn-select-native');
    try {
        if (window.electronAPI?.selectImageFolder) {
            const selected = await window.electronAPI.selectImageFolder();
            if (selected) {
                _selectedFolderPath = selected;
                updateFolderDisplay(selected);
                checkStyleSubfolders(selected);
            }
            return;
        }
        if (btn) btn.textContent = '⏳ 正在打开系统对话框...';
        const res = await fetch(`${API_BASE}/select-folder`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
        });
        const data = await res.json();
        if (btn) btn.innerHTML = '<span class="text-lg">📁</span> 点击选择文件夹';
        if (data.success && data.path) {
            _selectedFolderPath = data.path;
            updateFolderDisplay(data.path);
            checkStyleSubfolders(data.path);
        }
    } catch (err) {
        if (btn) btn.innerHTML = '<span class="text-lg">📁</span> 点击选择文件夹';
        if (statusEl) {
            statusEl.textContent = `❌ ${err.message}`;
            statusEl.className = 'mb-3 text-[10px] text-red-400';
            statusEl.classList.remove('hidden');

function updateFolderDisplay(folderPath) {
    const display = document.getElementById('selected-folder-display');
    if (display) {
        display.innerHTML = `<span class="text-cyan-200">${folderPath}</span>`;
    }
}

function checkStyleSubfolders(folderPath) {
    const checkEl = document.getElementById('folder-style-check');
    const tagsEl = document.getElementById('folder-style-tags');
    fetch(`${API_BASE}/browse-folder`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folderPath })
    }).then(r => r.json()).then(data => {
        if (!data.success) { checkEl.classList.add('hidden'); return; }
        const subs = (data.folders || []).map(f => typeof f === 'string' ? f : f.name);
        const has真人 = subs.includes('真人');
        const has2D = subs.includes('2D');
        const has3D = subs.includes('3D');
        if (has真人 || has2D || has3D) {
            checkEl.classList.remove('hidden');
            tagsEl.innerHTML =
                `<span class="text-[10px] px-2 py-1 border ${has真人 ? 'border-emerald-500/60 bg-emerald-900/30 text-emerald-300' : 'border-gray-700 bg-gray-900/30 text-gray-600'}">${has真人 ? '✅' : '❌'} 真人</span>` +
                `<span class="text-[10px] px-2 py-1 border ${has2D ? 'border-purple-500/60 bg-purple-900/30 text-purple-300' : 'border-gray-700 bg-gray-900/30 text-gray-600'}">${has2D ? '✅' : '❌'} 2D</span>` +
                `<span class="text-[10px] px-2 py-1 border ${has3D ? 'border-blue-500/60 bg-blue-900/30 text-blue-300' : 'border-gray-700 bg-gray-900/30 text-gray-600'}">${has3D ? '✅' : '❌'} 3D</span>`;
        } else {
            checkEl.classList.add('hidden');
        }
    }).catch(() => checkEl.classList.add('hidden'));
}

function initDraggable(panel, handle) {
    let isDragging = false;
    let startX, startY, startLeft, startTop;

    handle.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'BUTTON') return; // 不拦截按钮点击
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        startLeft = parseInt(panel.style.left) || 0;
        startTop = parseInt(panel.style.top) || 0;
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        let newLeft = startLeft + dx;
        let newTop = startTop + dy;
        // 限制不出视口
        const pw = panel.offsetWidth;
        const ph = panel.offsetHeight;
        if (newLeft < 0) newLeft = 0;
        if (newTop < 0) newTop = 0;
        if (newLeft + pw > window.innerWidth) newLeft = window.innerWidth - pw;
        if (newTop + ph > window.innerHeight) newTop = window.innerHeight - ph;
        panel.style.left = newLeft + 'px';
        panel.style.top = newTop + 'px';
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
    });
}

function toggleFolderBrowser() {
    const browser = document.getElementById('sel-folder-browser');
    if (!browser) return;
    if (browser.classList.contains('hidden')) {
        browser.classList.remove('hidden');
        const panel = activeSelectorPanel;

        }
    } else {
        browser.classList.add('hidden');
    }
}

function normalizeBrowserPath(value) {
    return String(value || '').replace(/\\/g, '/');
}

function escapeForSingleQuotedJs(value) {
    return String(value || '')
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'");
}

function getBrowseRelativePath(panel, browsePath) {
    if (!panel) return '';
    const basePath = normalizeBrowserPath(panel.dataset.baseLibraryPath || '');
    const currentPath = normalizeBrowserPath(browsePath || panel.dataset.browsePath || '');

    if (!basePath || !currentPath) return '';
    if (currentPath === basePath) return '';
    if (!currentPath.startsWith(basePath + '/')) return '';

    return currentPath.slice(basePath.length + 1);
}

function refreshSearchForCurrentBrowsePath() {
    const panel = activeSelectorPanel;
    if (!panel) return;

    const charIndex = Number(panel.dataset.charIndex);
    const partType = panel.dataset.partType;
    const genderKey = panel.dataset.genderKey;
    const relativePath = getBrowseRelativePath(panel);
    doSearch(charIndex, partType, genderKey, relativePath);
}

function getActivePanelBrowseRelativePath(charIndex, partType) {
    const panel = activeSelectorPanel;
    if (!panel) return null;
    if (Number(panel.dataset.charIndex) !== Number(charIndex)) return null;
    if (panel.dataset.partType !== partType) return null;
    return getBrowseRelativePath(panel);
}

async function browseFolder(folderPath) {
    const browser = document.getElementById('sel-folder-browser');
    if (!browser) return;
    browser.innerHTML = '<p class="text-[10px] text-orange-500 text-center py-3">⏳ 加载中...</p>';

    try {
        const res = await fetch(`${API_BASE}/browse-folder`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ folderPath })
        });
        const data = await res.json();

        if (!data.success) {
            browser.innerHTML = `<p class="text-[10px] text-red-500 text-center py-3">❌ ${data.message}</p>`;
            return;
        }

        // 更新当前浏览路径
        if (activeSelectorPanel) {
            activeSelectorPanel.dataset.browsePath = data.currentPath;
        }

        renderFolderBrowser(data);
    } catch (err) {
        browser.innerHTML = `<p class="text-[10px] text-red-500 text-center py-3">加载失败: ${err.message}</p>`;
    }
}

function renderFolderBrowser(data) {
    const browser = document.getElementById('sel-folder-browser');
    if (!browser) return;
    const panel = activeSelectorPanel;
    const preferred = panel ? panel.dataset.preferredSubfolder : '';

    // 面包屑路径（显示最后3层）
    const currentPath = normalizeBrowserPath(data.currentPath);
    const parentPath = normalizeBrowserPath(data.parentPath);
    const parts = currentPath.split('/');
    const displayPath = parts.slice(-3).join('/');

    let html = `
        <div class="px-3 py-2 border-b border-orange-900/20 flex items-center gap-2 sticky top-0 bg-[#0d0605] z-10">
            <button onclick="onFolderNavigate('${escapeForSingleQuotedJs(parentPath)}')" class="px-2 py-1 text-[9px] bg-orange-900/20 hover:bg-orange-600 hover:text-white text-orange-500 border border-orange-900/40 transition-all font-bold flex-shrink-0">
                ← 上级
            </button>
            <span class="text-[8px] text-orange-700 truncate flex-1" title="${currentPath}">/${displayPath}</span>
        </div>`;

    if (data.folders.length === 0 && data.images.length === 0) {
        html += '<p class="text-[10px] text-orange-900/60 text-center py-3">空文件夹</p>';
    }

    // 子文件夹列表
    if (data.folders.length > 0) {
        html += '<div class="px-2 py-1">';
        for (const folder of data.folders) {
            const isPreferred = preferred && folder.name === preferred;
            const folderPath = normalizeBrowserPath(folder.path);
            html += `
                <button onclick="onFolderClick('${escapeForSingleQuotedJs(folderPath)}', '${escapeForSingleQuotedJs(folder.name)}')"
                    class="w-full text-left px-2 py-1.5 text-[10px] flex items-center gap-2 hover:bg-orange-900/20 transition-colors rounded-sm
                    ${isPreferred ? 'bg-orange-900/30 border border-[#ff5e00]/50' : ''}">
                    <span class="text-orange-600">📁</span>
                    <span class="${isPreferred ? 'text-[#ff5e00] font-bold' : 'text-orange-300'}">${folder.name}</span>
                    <span class="text-[8px] text-orange-700 ml-auto">${folder.imageCount}张</span>
                </button>`;
        }
        html += '</div>';
    }



    browser.innerHTML = html;
}

function onFolderNavigate(folderPath) {
    if (!activeSelectorPanel) return;
    browseFolder(folderPath);
    if (activeSelectorPanel) {
        activeSelectorPanel.dataset.browsePath = folderPath;
    }

    const label = document.getElementById('sel-folder-label');
    if (label) {
        const relativePath = getBrowseRelativePath(activeSelectorPanel, folderPath);
        label.textContent = relativePath || pathLabelForPart(activeSelectorPanel.dataset.partType);
    }

    refreshSearchForCurrentBrowsePath();
}

function pathLabelForPart(partType) {
    return partType === 'face' ? '脸' : partType === 'hair' ? '发型' : partType === 'clothes' ? '服装' : '素材';
}

async function onFolderClick(folderPath, folderName) {
    // 更新文件夹按钮标签
    const label = document.getElementById('sel-folder-label');
    if (label) label.textContent = folderName;

    // 自动下钻：如果文件夹内只有子文件夹、没有图片，自动进入第一个子文件夹
    let currentPath = folderPath;
    let currentName = folderName;
    let maxDrill = 5; // 防止无限循环
    while (maxDrill-- > 0) {
        try {
            const res = await fetch(`${API_BASE}/browse-folder`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ folderPath: currentPath })
            });
            const data = await res.json();
            if (data.success && data.folders.length > 0 && data.images.length === 0) {
                // 只有子文件夹，没有图片 → 自动下钻到第一个子文件夹
                currentPath = data.folders[0].path;
                currentName = data.folders[0].name;
                if (label) label.textContent = currentName;
            } else {
                break; // 到达叶子层级或有图片了
            }
        } catch (e) {
            break;
        }
    }

    // 浏览最终到达的文件夹
    browseFolder(currentPath);

    // 通过 search-images API 加载搜索结果
    const panel = activeSelectorPanel;
    if (panel) {
        panel.dataset.browsePath = currentPath;
        const relativePath = getBrowseRelativePath(panel, currentPath);
        if (label) label.textContent = relativePath || folderName;
        const charIndex = parseInt(panel.dataset.charIndex);
        const partType = panel.dataset.partType;
        const genderKey = panel.dataset.genderKey;
        doSearch(charIndex, partType, genderKey, relativePath);
    }
}

// =============================================
// 搜索图片
// =============================================
async function doSearch(charIndex, partType, genderKey, overrideSubfolder) {
    const input = document.getElementById('sel-search-input');
    const results = document.getElementById('sel-results');
    const query = input ? input.value.trim() : '';

    // 文件夹浏览器选择时使用 overrideSubfolder，否则优先使用当前正在浏览的文件夹，
    // 最后再回退到智能匹配的默认子文件夹。
    let subfolder = '';
    if (overrideSubfolder !== undefined) {
        subfolder = overrideSubfolder;
    } else {
        const activeBrowseRelativePath = getActivePanelBrowseRelativePath(charIndex, partType);
        if (activeBrowseRelativePath !== null) {
            subfolder = activeBrowseRelativePath;
        }
    }

    if (!subfolder && parsedCharacters[charIndex]) {
        const char = parsedCharacters[charIndex];
        if (partType === 'face') subfolder = char.preferredFaceSubfolder || '';
        else if (partType === 'hair') subfolder = char.preferredHairSubfolder || '';
        else if (partType === 'clothes') subfolder = char.preferredClothesSubfolder || '';
    }

    if (activeSelectorPanel &&
        Number(activeSelectorPanel.dataset.charIndex) === Number(charIndex) &&
        activeSelectorPanel.dataset.partType === partType) {
        activeSelectorPanel.dataset.browsePath = subfolder
            ? `${activeSelectorPanel.dataset.baseLibraryPath}/${subfolder}`
            : activeSelectorPanel.dataset.baseLibraryPath;
    }

    results.innerHTML = '<p class="text-[10px] text-orange-500 text-center py-4">⏳ 搜索中...</p>';

    try {
        const res = await fetch(`${API_BASE}/search-images`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ gender: genderKey, partType, query, subfolder, style: getCurrentStyleCode() || DEFAULT_STYLE_CODE })
        });
        const data = await res.json();

        if (!data.success || data.images.length === 0) {
            results.innerHTML = '<p class="text-[10px] text-orange-900/60 text-center py-4">未找到匹配的图片</p>';
            return;
        }

        results.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-3 gap-2';

        data.images.forEach(img => {
            const item = document.createElement('div');
            item.className = 'relative cursor-pointer group border border-orange-900/30 hover:border-[#ff5e00] transition-all';
            item.innerHTML = `
                <img src="${IMAGES_SERVER}${img.url}" class="w-full aspect-square object-cover opacity-70 group-hover:opacity-100 transition-opacity" />
                <div class="absolute bottom-0 left-0 right-0 bg-black/80 px-1 py-0.5">
                    <span class="text-[7px] text-orange-500 truncate block">${img.subfolder || img.filename}</span>
                </div>`;
            const imgSrc = `${IMAGES_SERVER}${img.url}`;
            item.addEventListener('mouseenter', (e) => showHoverPreview(e, imgSrc));
            item.addEventListener('mouseleave', hideHoverPreview);
            item.onclick = () => selectImage(charIndex, partType, imgSrc);
            grid.appendChild(item);
        });

        results.appendChild(grid);
    } catch (err) {
        results.innerHTML = `<p class="text-[10px] text-red-500 text-center py-4">搜索失败: ${err.message}</p>`;
    }
}

function getLocalLibraryUploadContext(panel) {

    let subfolder = '';

    if (baseLibraryPath && browsePath.startsWith(baseLibraryPath + '/')) {
        subfolder = browsePath.slice(baseLibraryPath.length + 1);
    }

    return {
        gender: panel.dataset.genderKey || 'female',
        partType: panel.dataset.partType || 'face',
        subfolder
    };
}

function uploadLocalImageToLibrary(dataUrl, fileName, context) {
    return fetch(`${API_BASE}/upload-image`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            image: dataUrl,
            gender: context.gender,
            partType: context.partType,
            subfolder: context.subfolder,
            filename: fileName
        })
    })
        .then(r => r.json())
        .then(data => {
            if (data.success) showToast(`✅ ${data.message || '已添加到本地素材库'}`);
            else showToast(`❌ 添加失败: ${data.message}`);

}

    event.target.value = '';
}

// 单体生成
// =============================================
async function generateCharacter(charIndex) {
    // 首次生图风格确认
    if (!window.styleConfirmed) {
        if (!confirm(`当前风格预设为：${window.currentStyleLabel || '未选择'}\n确定使用此风格生成图片吗？`)) return;
        window.styleConfirmed = true;
    }
    const char = parsedCharacters[charIndex];
    const s = charStates[charIndex];
    const btn = document.getElementById(`gen-btn-${charIndex}`);

    btn.disabled = true;
    btn.textContent = '拼接中...';

    // 插入占位图到第三列
    const phId = addResultPlaceholder(charIndex);

    try {
        // 拼接图片（如果有图片的话）
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const imgW = 512, imgH = 768;

        // 计算需要的图片数量
        const parts = [];
        if (s.face.image) parts.push({ type: 'face', url: s.face.image });
        if (s.hair.image) parts.push({ type: 'hair', url: s.hair.image });
        if (s.clothes.image) parts.push({ type: 'clothes', url: s.clothes.image });

        canvas.width = imgW * Math.max(parts.length, 1);
        canvas.height = imgH;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 加载图片
        const loadImg = (url) => new Promise((res, rej) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => res(img);
            img.onerror = rej;
            img.src = url;
        });

        for (let i = 0; i < parts.length; i++) {
            const img = await loadImg(parts[i].url);
            ctx.drawImage(img, i * imgW, 0, imgW, imgH);
        }

        const mergedBase64 = canvas.toDataURL('image/png');

        // 构建提示词
        let genPrompt = '将图中的';
        const promptParts = [];
        if (s.face.image) promptParts.push('人物脸部');
        if (s.hair.image) promptParts.push('发型');
        if (s.clothes.image) promptParts.push('服装');
        else if (s.clothes.prompt) promptParts.push(s.clothes.prompt);

        const genderKey = char.gender && char.gender.includes('男') ? 'male' : 'female';
        genPrompt += promptParts.join('、');
        if (genderKey === 'male') {
            genPrompt += '，融合成一个新的人物，保持人物画风不变，保持人物脸部的妆容和无五官细节，纯白色背景，腰部以上半身像，正对镜头，注意。不要压缩人物的脸部长度，要让人物脸部保持原图的比例。';
        } else {
            genPrompt += '，融合成一个新的人物，保持人物画风不变，保持人物脸部的妆容细节（眼妆、唇妆、腮红等，如果原图没有不要添加），纯白色背景，腰部以上半身像，正对镜头，注意。不要压缩人物的脸部长度，要让人物脸部保持原图的比例。';
        }

        // 服装：有图片时忽略提示词，无图片时才使用提示词

        // 添加风格预设提示词
        if (window.currentStylePrompt) {
            genPrompt = window.currentStylePrompt + '。' + genPrompt;
        }
        // 拼接相机参数（仅用于API，不显示）
        let apiGenPrompt = genPrompt;
        const cameraPrompt = typeof getCameraPromptString === 'function' ? getCameraPromptString() : '';
        if (cameraPrompt) apiGenPrompt = cameraPrompt + '. ' + apiGenPrompt;
        const _dl1 = getDramaLightingPrompt(); if (_dl1) apiGenPrompt += ' ' + _dl1;

        btn.textContent = '生成中...';

        const res = await fetch(`${API_BASE}/generate-image`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: mergedBase64, prompt: apiGenPrompt, apiKey: (apiKeyInput ? apiKeyInput.value.trim() : '') })
        });
        const data = await res.json();

        if (data.success) {
            // 替换占位图为真实结果
            replaceResultPlaceholder(phId, charIndex, data.imageUrl, char.name);
            btn.textContent = '✅ 生成完成';
        } else {
            removeResultPlaceholder(phId);
            alert('生成失败: ' + data.message);
            btn.textContent = '单体生成';
        }
    } catch (err) {

    }
}

// 通用图片下载（解决跨域 download 属性无效问题）
async function downloadImage(url, filename) {
    try {
        const resp = await fetch(url);
        const blob = await resp.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename || 'image.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
    } catch (e) {
        console.warn('下载失败，尝试直接打开:', e);
        window.open(url, '_blank');
    }
}

// =============================================
// 生成三视图
// =============================================
async function generateThreeView(charIndex, halfBodyUrl, charName, btn) {
    const sourceMeta = getResultImageSourceMeta(charIndex, halfBodyUrl);
    console.log(`[生成三视图调用] ${charName} (#${charIndex})`, {
        halfBodyUrl,
        normalizedHalfBodyUrl: normalizeImageUrlForCompare(halfBodyUrl),
        sourceType: sourceMeta.sourceType
    });
    btn.textContent = '⏳ 生成中...';
    btn.disabled = true;

    const prompt = '根据图中的人物，生成一张人物的三视图，分别为左侧面，正面，背面，纯白色背景，全身照，模特比例，九头身，长腿，优化身高比例。';
    const apiKey = document.getElementById('api-key-input')?.value?.trim() || '';

    // 添加风格预设
    let fullPrompt = prompt;
    if (window.currentStylePrompt) {
        fullPrompt = window.currentStylePrompt + '。' + prompt;
    }
    // 拼接相机参数（仅用于API，不显示）
    let apiFullPrompt = fullPrompt;
    const camPrompt = typeof getCameraPromptString === 'function' ? getCameraPromptString() : '';
    if (camPrompt) apiFullPrompt = camPrompt + '. ' + apiFullPrompt;
    const _dl2 = getDramaLightingPrompt(); if (_dl2) apiFullPrompt += ' ' + _dl2;

    // 第四列插入占位图
    const tvPhId = addThreeViewPlaceholder(charIndex);

    try {
        // 加载半身图base64
        const toBase64 = async (url) => {
            if (!url || url.startsWith('data:')) return url;
            const resp = await fetch(url);
            const blob = await resp.blob();
            return new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(blob); });
        };

        let imageBase64 = await toBase64(halfBodyUrl);

        // 只有“前面生成出来的半身图”才追加服装参考；自动匹配图只用半身图本身
        const clothesImg = charStates[charIndex]?.clothes?.image;
        const shouldMergeClothes = !!clothesImg && sourceMeta.isGeneratedResult;
        if (shouldMergeClothes) {
            const loadImg = (url) => new Promise((res, rej) => { const img = new Image(); img.crossOrigin = 'anonymous'; img.onload = () => res(img); img.onerror = rej; img.src = url; });
            const [halfEl, clothesEl] = await Promise.all([loadImg(halfBodyUrl), loadImg(clothesImg)]);
            const tH = Math.max(halfEl.height, clothesEl.height);
            const hW = Math.round(halfEl.width * (tH / halfEl.height));
            const cW = Math.round(clothesEl.width * (tH / clothesEl.height));
            const cvs = document.createElement('canvas');
            cvs.width = hW + cW; cvs.height = tH;
            const cx = cvs.getContext('2d');
            cx.fillStyle = '#fff'; cx.fillRect(0, 0, cvs.width, cvs.height);
            cx.drawImage(halfEl, 0, 0, hW, tH);
            cx.drawImage(clothesEl, hW, 0, cW, tH);
            imageBase64 = cvs.toDataURL('image/png');
        }

        try {
            const debugRes = await fetch('/api/save-base64', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    data: imageBase64,
                    prefix: `tv_input_${sanitizeDebugName(charName)}`,
                    recordName: 'threeview_input_debug',
                    metadata: {
                        charIndex,
                        charName,
                        halfBodyUrl,
                        normalizedHalfBodyUrl: normalizeImageUrlForCompare(halfBodyUrl),
                        sourceType: sourceMeta.sourceType,
                        clothesImg: shouldMergeClothes ? clothesImg : '',
                        normalizedClothesUrl: shouldMergeClothes ? normalizeImageUrlForCompare(clothesImg || '') : '',
                        hasClothesReference: shouldMergeClothes,
                        prompt: apiFullPrompt
                    }
                })
            });
            const debugData = await debugRes.json();
            if (debugData.success) {
                console.log(`[三视图输入导出] ${charName} (#${charIndex})`, {
                    exportedImageUrl: debugData.localUrl,
                    debugRecordFile: debugData.recordFile || '',
                    halfBodyUrl,
                    sourceType: sourceMeta.sourceType,
                    clothesImg: shouldMergeClothes ? clothesImg : '',
                    hasClothesReference: shouldMergeClothes
                });
            } else {
                console.warn(`[三视图输入导出失败] ${charName} (#${charIndex})`, debugData.message || '未知错误');
            }
        } catch (debugErr) {
            console.warn(`[三视图输入导出异常] ${charName} (#${charIndex})`, debugErr.message);
        }

        const res = await fetch(`${API_BASE}/generate-image`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                image: imageBase64,
                prompt: apiFullPrompt,
                apiKey,
                aspect_ratio: '16:9'
            })
        });
        const data = await res.json();

        if (data.success && data.imageUrl) {
            btn.textContent = '✅ 拼接中...';
            updateThreeViewPlaceholder(tvPhId, '三视图拼接中...', '拼接中');
            // 拼接半身图 + 三视图
            await combineAndAddToCol4(charIndex, halfBodyUrl, data.imageUrl, charName);
            removeThreeViewPlaceholder(tvPhId);
            btn.textContent = '✅ 完成';
            saveCharacterState();
        } else {
            removeThreeViewPlaceholder(tvPhId);
            alert('三视图生成失败: ' + (data.message || '未知错误'));
            btn.textContent = '生成三视图';
        }
    } catch (err) {
        removeThreeViewPlaceholder(tvPhId);
        console.error('三视图生成失败', err);
        alert('三视图生成错误: ' + err.message);
        btn.textContent = '生成三视图';
    } finally {
        btn.disabled = false;
        setTimeout(() => { btn.textContent = '生成三视图'; }, 3000);
    }
}

    let anchor = addBtn;
    if (anchor.parentElement !== container && anchor.parentElement?.parentElement === container) {
        anchor = anchor.parentElement;

    if (anchor.parentElement !== container) {
        container.appendChild(node);
        return;
    }

    container.insertBefore(node, anchor.nextSibling);
}

// 拼接半身图+三视图 放入第四列
async function combineAndAddToCol4(charIndex, halfBodyUrl, threeViewUrl, charName) {
    const loadImg = (url) => new Promise((res, rej) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => res(img);
        img.onerror = rej;
        img.src = url;
    });

    const [halfImg, tvImg] = await Promise.all([loadImg(halfBodyUrl), loadImg(threeViewUrl)]);

    const canvas = document.createElement('canvas');
    const targetH = Math.max(halfImg.height, tvImg.height);
    const halfW = Math.round(halfImg.width * (targetH / halfImg.height));
    const tvW = Math.round(tvImg.width * (targetH / tvImg.height));
    canvas.width = halfW + tvW;
    canvas.height = targetH;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(halfImg, 0, 0, halfW, targetH);
    ctx.drawImage(tvImg, halfW, 0, tvW, targetH);

    const base64Data = canvas.toDataURL('image/png');
    // 保存到服务器，获取持久化 URL
    try {
        const saveRes = await fetch('/api/save-base64', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: base64Data, prefix: `tv_${charName}` })
        });
        const saveData = await saveRes.json();
        if (saveData.success && saveData.localUrl) {
            addToThreeViewCol(charIndex, saveData.localUrl, charName);
            return;
        }
    } catch (e) {
        console.warn('保存合成图到服务器失败，使用 base64:', e.message);
    }
    // fallback: 直接用 base64（不可持久化但至少能显示）
    addToThreeViewCol(charIndex, base64Data, charName);
}

// 添加图片到第四列
function addToThreeViewCol(charIndex, imgUrl, charName, options = {}) {
    const col = document.getElementById(`three-view-col-${charIndex}`);

        sourceType = 'user',
        replaceSourceType = '',
        showNewBadge,
        scorePercent = null,
        scoreTitle = '',
        activate = true,
        sourceBadgeLabel = ''
    } = options || {};

        ? showNewBadge
        : shouldShowNewBadgeForThreeViewSource(sourceType);
    const resolvedSourceBadgeLabel = sourceBadgeLabel || getThreeViewSourceBadgeLabel(sourceType);

        ? [...col.querySelectorAll('.tv-card-wrapper')].find(wrapper => {
            const wrapperKey = wrapper.dataset.imgKey || normalizeImageUrlForCompare(wrapper.dataset.imgUrl || wrapper.querySelector('img')?.src || '');
            return wrapperKey === normalizedImgUrl;
        })
        : null;

    if (existingWrapper) {

        saveCharacterState();
        return;
    }

    const wrapper = document.createElement('div');

        <img src="${imgUrl}" class="w-full h-full object-cover opacity-85 group-hover:opacity-100 transition-opacity" style="object-position:top left;" />
        ${resolvedShowNewBadge ? '<div class="new-badge absolute top-1 right-1 bg-green-500 px-1.5 py-0.5 text-[7px] text-white font-black z-10">新生成</div>' : ''}

        ${Number.isFinite(scorePercent) ? `<div class="absolute bottom-1 left-1 bg-black/80 pl-6 pr-1 py-0.5 text-[7px] font-bold ${scorePercent >= 50 ? 'text-green-400' : 'text-orange-400'} z-10" title="${scoreTitle || `标签匹配度: ${scorePercent}%`}">${scorePercent}% 匹配</div>` : ''}
        <a href="${imgUrl}" download="${charName}_三视图_${Date.now()}.png" onclick="event.stopPropagation()" class="absolute bottom-1 right-1 bg-black/80 px-1 py-0.5 text-[7px] text-orange-400 hover:text-white cursor-pointer">⬇</a>
        <input type="checkbox" class="img-select-cb" onclick="toggleImageSelect(event)" title="选择此图" />
        <div class="absolute top-1 left-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="event.stopPropagation(); this.closest('.tv-card-wrapper').remove();" class="w-5 h-5 bg-black/70 text-red-400 hover:text-red-300 text-[10px] flex items-center justify-center rounded-sm">✕</button>
        </div>`;
    card.addEventListener('mouseenter', (e) => showHoverPreview(e, imgUrl));
    card.addEventListener('mouseleave', hideHoverPreview);
    card.addEventListener('click', () => showLightbox(imgUrl));

    wrapper.appendChild(card);

    const btnRow = document.createElement('div');
    btnRow.className = 'flex gap-1 mt-1 w-full invisible pointer-events-none';
    btnRow.innerHTML = '<button class="flex-1 py-1 text-[8px] border border-transparent">.</button>';
    wrapper.appendChild(btnRow);


    // "+"按钮固定在最左侧，新图片插到其右侧（第二个位置）
    insertAfterThreeViewAddButton(col, wrapper);
    if (activate) {
        setActiveThreeViewWrapper(col, wrapper, resolvedShowNewBadge);
    }

    const sdInput = document.getElementById('sd-api-key-input');

    // 恢复
    const savedZz = localStorage.getItem('zhenzhen-api-key');
