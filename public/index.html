// =============================================
// 关键词提取（基于打标器规则的17个维度）
// =============================================
function extractKeywords(prompt) {
    const keywords = [];

    // 性别
    if (/男/.test(prompt)) keywords.push('男');
    if (/女/.test(prompt)) keywords.push('女');

    // 年龄段推断
    const ageMatch = prompt.match(/约?(\d{1,2})[多余]?岁/);
    if (ageMatch) {
        const age = parseInt(ageMatch[1]);
        const low = Math.floor(age / 5) * 5;
        keywords.push(`${low}-${low + 5}`);
    } else {
        if (/年幼|小女孩|小男孩|孩童/.test(prompt)) keywords.push('10-15');
        if (/少年|少女|十五六/.test(prompt)) keywords.push('15-20');
        if (/年轻|青年|二十/.test(prompt)) keywords.push('20-25');
        if (/中年|四十/.test(prompt)) keywords.push('35-40');
        if (/老者|老年|七十|白发苍苍/.test(prompt)) keywords.push('65-70');
    }

    // 脸型
    const faceShapes = ['圆脸', '鹅蛋脸', '瓜子脸', '方脸', '长脸', '心形脸', '菱形脸', '国字脸'];
    faceShapes.forEach(kw => { if (prompt.includes(kw)) keywords.push(kw); });

    // 眉毛
    const eyebrows = ['柳叶眉', '一字眉', '剑眉', '弯月眉', '粗眉', '细眉', '高挑眉', '八字眉'];
    eyebrows.forEach(kw => { if (prompt.includes(kw)) keywords.push(kw); });

    // 眼睛
    const eyes = ['杏仁眼', '丹凤眼', '桃花眼', '圆眼', '狐狸眼', '细长眼', '下垂眼', '大眼', '卧蚕明显', '星目', '大眼睛'];
    eyes.forEach(kw => { if (prompt.includes(kw)) keywords.push(kw); });

    // 鼻子
    const noses = ['高鼻梁', '塌鼻梁', '挺鼻', '蒜头鼻', '鹰钩鼻', '小巧鼻', '翘鼻'];
    noses.forEach(kw => { if (prompt.includes(kw)) keywords.push(kw); });

    // 嘴唇
    const lips = ['薄唇', '厚唇', '樱桃小嘴', '丰满唇', '微笑唇', '上翘唇'];
    lips.forEach(kw => { if (prompt.includes(kw)) keywords.push(kw); });

    // 肤色
    const skins = ['白皙', '小麦色', '健康肤色', '偏黑', '粉白', '苍白', '蜡黄'];
    skins.forEach(kw => { if (prompt.includes(kw)) keywords.push(kw); });

    // 气质/表情
    const temperaments = ['冷酷', '温柔', '阳光', '忧郁', '英气', '妩媚', '可爱', '高冷', '成熟', '活泼',
        '英俊', '帅气', '美丽', '灵动', '俏皮', '冷艳', '妖艳', '坚毅', '慈祥'];
    temperaments.forEach(kw => { if (prompt.includes(kw)) keywords.push(kw); });

    // 发型
    if (/长发/.test(prompt)) keywords.push('长发');
    if (/短发/.test(prompt)) keywords.push('短发');
    if (/中长发/.test(prompt)) keywords.push('中长发');
    if (/直发/.test(prompt)) keywords.push('直发');
    if (/卷发/.test(prompt)) keywords.push('卷发');
    if (/波浪/.test(prompt)) keywords.push('波浪');
    if (/马尾/.test(prompt)) keywords.push('马尾');
    if (/双马尾/.test(prompt)) keywords.push('双马尾');
    if (/丸子头/.test(prompt)) keywords.push('丸子头');
    if (/编发|辫子|麻花辫/.test(prompt)) keywords.push('编发');
    if (/盘发/.test(prompt)) keywords.push('盘发');
    if (/齐刘海/.test(prompt)) keywords.push('齐刘海');
    if (/斜刘海/.test(prompt)) keywords.push('斜刘海');
    if (/空气刘海/.test(prompt)) keywords.push('空气刘海');

    // 发色
    const hairColors = ['黑发', '棕发', '金发', '银发', '红发', '白发', '枯黄'];
    hairColors.forEach(kw => { if (prompt.includes(kw)) keywords.push(kw); });

    // 服饰风格
    const styles = ['古风', '现代', '赛博朋克', '校园', '军装', '奇幻', '哥特', '洛丽塔', '武侠', '仙侠',
        '仙', '古装', '道袍', '汉服', '盔甲', '制服'];
    styles.forEach(kw => { if (prompt.includes(kw)) keywords.push(kw); });

    // 体型
    const bodyTypes = ['高挑', '娇小', '壮硕', '纤细', '匀称', '丰满', '瘦削', '瘦弱'];
    bodyTypes.forEach(kw => { if (prompt.includes(kw)) keywords.push(kw); });

    // 去重
    return [...new Set(keywords)];
}

// =============================================
// 三视图自动匹配
// =============================================
async function autoMatchThreeViews(characters) {
    for (let i = 0; i < characters.length; i++) {
        const char = characters[i];
        const keywords = extractKeywords(char.prompt);

        // 确定性别和角色
        const gender = char.gender === 'male' ? 'male' : (char.gender === 'female' ? 'female' : null);
        if (!gender) continue; // 未识别性别的跳过

        const role = char.preferredFaceSubfolder?.includes('主角') ? 'lead' : 'support';

        const aiContent = document.getElementById(`three-view-col-${i}`);
        if (!aiContent) continue;

        aiContent.querySelectorAll('.tv-auto-match-loading').forEach(el => el.remove());
        aiContent.querySelectorAll('.tv-auto-match-empty').forEach(el => el.remove());

        const loadingEl = document.createElement('div');
        loadingEl.className = 'tv-auto-match-loading flex-shrink-0 flex items-center justify-center w-40 h-44 border border-orange-900/30 bg-black/30';
        loadingEl.innerHTML = `<span class="text-[9px] text-orange-500 animate-pulse">🔍 匹配三视图...</span>`;
        insertAfterThreeViewAddButton(aiContent, loadingEl);

        try {
            const res = await fetch(`${API_BASE}/search-three-views`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ gender, role, keywords })
            });
            const data = await res.json();
            loadingEl.remove();

            const clearAutoMatchedCards = () => {
                aiContent.querySelectorAll('.tv-card-wrapper[data-source-type="auto-search"]').forEach(el => el.remove());
                aiContent.querySelectorAll('.tv-auto-match-empty').forEach(el => el.remove());
                [...aiContent.children].forEach(el => {
                    if (el.classList?.contains('group')) {
                        el.remove();
                    }
                });
            };

            if (data.success && data.images.length > 0) {
                clearAutoMatchedCards();
                const maxShow = Math.min(data.images.length, 1);

                for (let j = maxShow - 1; j >= 0; j--) {
                    const img = data.images[j];
                    const scorePercent = img.hasTagFile
                        ? Math.min(100, Math.round((img.matchScore / Math.max(keywords.length, 1)) * 100))
                        : 0;
                    const matchedTagText = (img.matchedTags || []).slice(0, 6).join('，') || '无';
                    const imageUrl = img.url.startsWith('http') ? img.url : `${IMAGES_SERVER}${img.url}`;
                    addToThreeViewCol(i, imageUrl, char.name || '角色', {
                        sourceType: 'auto-search',
                        showNewBadge: false,
                        scorePercent: img.hasTagFile ? scorePercent : null,
                        scoreTitle: img.hasTagFile
                            ? `标签匹配度: ${scorePercent}%\n命中标签: ${matchedTagText}`
                            : '未打标',
                        activate: false,
                        sourceBadgeLabel: '自动匹配'
                    });
                }
                saveCharacterState();
            } else {
                clearAutoMatchedCards();
                const emptyEl = document.createElement('div');
                emptyEl.className = 'tv-auto-match-empty flex-shrink-0 flex flex-col items-center justify-center w-40 h-44 border border-orange-900/20 bg-black/20 text-center px-3';
                emptyEl.innerHTML = `
                    <span class="text-[10px] text-orange-600 mb-1">暂无三视图匹配</span>
                    <span class="text-[8px] text-orange-700">请先用打标器为三视图图片打标</span>`;
                insertAfterThreeViewAddButton(aiContent, emptyEl);
                saveCharacterState();
            }
        } catch (err) {
            loadingEl.remove();
            console.error(`三视图匹配失败 [${char.name}]`, err);
        }
    }
}

function handleThreeViewLocalFile(event, charIndex) {
    const file = event.target.files[0];
    if (!file) return;
    const addToLib = document.getElementById('tv-add-to-library');
    const shouldUpload = addToLib && addToLib.checked;
    const panel = activeSelectorPanel;
    const gender = panel ? panel.dataset.gender : 'male';
    const role = panel ? panel.dataset.role : 'support';
    // 转换为实际文件夹名，如 "男主角"、"女配角"
    const genderName = gender === 'male' ? '男' : '女';
    const roleName = role === 'lead' ? '主角' : '配角';
    const folderRole = genderName + roleName; // 例: "男主角"
    const reader = new FileReader();
    reader.onload = (e) => {
        const dataUrl = e.target.result;
        // 同步调用，避免面板关闭后 DOM 失效
        selectThreeView(charIndex, dataUrl);
        // 上传异步处理，不影响主流程
        if (shouldUpload) {
            fetch(`${API_BASE}/upload-image`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    image: dataUrl,
                    gender,
                    partType: 'threeview',
                    subfolder: folderRole,
                    filename: file.name
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) showToast(`✅ ${data.message}`);
                else showToast(`❌ 添加失败: ${data.message}`);
            })
            .catch(err => showToast(`❌ 上传出错: ${err.message}`));
        }
    };
    reader.readAsDataURL(file);
}

// 将面板纪束在视口内
function clampPanelToViewport(panel, rect) {
    const panelH = panel.offsetHeight;
    const panelW = panel.offsetWidth;
    const maxH = window.innerHeight - 20;

    // 限制 max-height
    if (panelH > maxH) {
        panel.style.maxHeight = maxH + 'px';
    }

    // 计算 left
    let finalLeft = parseInt(panel.style.left) || 0;
    if (finalLeft + panelW > window.innerWidth - 10) {
        finalLeft = window.innerWidth - panelW - 10;
    }
    if (finalLeft < 10) finalLeft = 10;
    panel.style.left = finalLeft + 'px';

    // 从当前行底部向上展开
    const measuredH = Math.min(panel.offsetHeight, maxH);
    const rowBottom = rect ? rect.bottom : window.innerHeight / 2;
    let top = rowBottom - measuredH;
    // 如果向上超出屏幕，钦定在顶部
    if (top < 10) top = 10;
    // 如果向下超出屏幕
    if (top + measuredH > window.innerHeight - 10) top = window.innerHeight - measuredH - 10;
    panel.style.top = top + 'px';
    panel.style.visibility = 'visible';
}

// 悬停预览大图
let hoverPreviewEl = null;
function showHoverPreview(e, imgUrl) {
    // 鼠标在按钮/链接/复选框上时，不显示放大预览
    if (e.target && e.target.closest('button, a, input[type="checkbox"], .no-preview')) {
        return;
    }
    hideHoverPreview();
    const card = e.currentTarget;
    const cardRect = card.getBoundingClientRect();

    const preview = document.createElement('div');
    preview.id = 'hover-preview';
    preview.className = 'fixed z-[100] pointer-events-none';
    preview.innerHTML = `<img src="${imgUrl}" class="max-w-[400px] max-h-[500px] object-contain border-2 border-orange-600/60 shadow-[0_0_30px_rgba(255,94,0,0.3)] bg-black" />`;
    document.body.appendChild(preview);
    hoverPreviewEl = preview;

    requestAnimationFrame(() => {
        const pw = preview.offsetWidth;
        const ph = preview.offsetHeight;
        // 尝试在卡片上方显示
        let left = cardRect.left;
        let top = cardRect.top - ph - 8;
        // 上方放不下，放下方
        if (top < 10) top = cardRect.bottom + 8;
        // 确保不超出右边
        if (left + pw > window.innerWidth - 10) left = window.innerWidth - pw - 10;
        if (left < 10) left = 10;
        // 确保不超出下方
        if (top + ph > window.innerHeight - 10) top = window.innerHeight - ph - 10;
        preview.style.left = left + 'px';
        preview.style.top = top + 'px';
    });
}

function hideHoverPreview() {
    if (hoverPreviewEl) {
        hoverPreviewEl.remove();
        hoverPreviewEl = null;
    }
}

// 全局 mouseover 委托：鼠标移到按钮/链接/复选框上时，隐藏悬浮预览
document.addEventListener('mouseover', (e) => {
    if (hoverPreviewEl && e.target.closest('button, a, input[type="checkbox"], .no-preview')) {
        hideHoverPreview();
    }
});

// 点击查看完整大图
function showLightbox(imgUrl) {
    hideHoverPreview();
    const overlay = document.createElement('div');
    overlay.id = 'lightbox-overlay';
    overlay.className = 'fixed inset-0 z-[200] bg-black/85 flex items-center justify-center cursor-pointer';
    overlay.innerHTML = `<img src="${imgUrl}" class="max-w-[90vw] max-h-[90vh] object-contain border border-orange-600/50 shadow-[0_0_40px_rgba(255,94,0,0.3)]" />`;
    overlay.onclick = () => overlay.remove();
    document.addEventListener('keydown', function escHandler(e) {
        if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escHandler); }
    });
    document.body.appendChild(overlay);
}

async function batchGenerateAll() {
    if (!parsedCharacters || parsedCharacters.length === 0) {
        alert('请先上传角色设定');
        return;
    }
    // 首次生图风格确认
    if (!window.styleConfirmed) {
        if (!confirm(`当前风格预设为：${window.currentStyleLabel || '未选择'}\n确定使用此风格生成图片吗？`)) return;
        window.styleConfirmed = true;
    }

    const checkedIndices = [];
    for (let i = 0; i < parsedCharacters.length; i++) {
        const cb = document.getElementById(`char-check-${i}`);
        if (cb && cb.checked) checkedIndices.push(i);
    }
    if (checkedIndices.length === 0) { alert('请至少勾选一个角色'); return; }

    // 分类：合规 vs 不合规
    const valid = [], invalid = [];
    for (const idx of checkedIndices) {
        const s = charStates[idx];
        const missing = [];
        if (!s.face.image) missing.push('人脸参考');
        if (!s.hair.image && !s.hair.prompt) missing.push('发型参考/提示词');
        if (!s.clothes.image && !s.clothes.prompt) missing.push('服装参考/提示词');
        if (missing.length > 0) {
            invalid.push({ idx, name: parsedCharacters[idx].name, missing });
        } else {
            valid.push(idx);
        }
    }

    if (invalid.length > 0) {
        const invalidList = invalid.map(c => `• ${c.name}：缺少 ${c.missing.join('、')}`).join('\n');
        const msg = `以下 ${invalid.length} 个角色未满足生成条件：\n\n${invalidList}\n\n` +
            (valid.length > 0 ? `是否只生成剩余 ${valid.length} 个合规角色？` : '没有合规角色可以生成。');
        if (valid.length === 0) { alert(msg); return; }
        if (!confirm(msg)) return;
    }

    // 所有按钮标记为生成中
    for (const idx of valid) {
        const btn = document.getElementById(`gen-btn-${idx}`);
        if (btn) { btn.disabled = true; btn.textContent = '⏳ 生成中...'; btn.classList.add('opacity-40', 'cursor-not-allowed'); }
    }

    // 并行提交所有生成请求
    const total = valid.length;
    const results = await Promise.allSettled(valid.map(idx => generateCharacter(idx)));
    const failed = results.filter(r => r.status === 'rejected').length;
    alert(`批量生成完成！共 ${total} 个角色${failed > 0 ? `，${failed} 个失败` : ''}`);
}

async function generateMakeup(charIndex, halfBodyUrl, charName, btn) {
    btn.textContent = '⏳ 化妆中...';
    btn.disabled = true;

    const phId = addResultPlaceholder(charIndex);

    // 根据性别选择提示词
    const gender = parsedCharacters[charIndex]?.gender || 'female';
    const makeupPrompt = (gender === 'male') ? MAKEUP_PROMPT_MALE : MAKEUP_PROMPT_FEMALE;

    try {
        // 加载半身图为 base64
        const toBase64 = async (url) => {
            if (!url || url.startsWith('data:')) return url;
            const resp = await fetch(url);
            const blob = await resp.blob();
            return new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(blob); });
        };
        const imageBase64 = await toBase64(halfBodyUrl);
        const apiKey = document.getElementById('api-key-input')?.value?.trim() || '';

        const res = await fetch(`${API_BASE}/generate-image`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: imageBase64, prompt: makeupPrompt, apiKey })
        });
        const data = await res.json();

        if (data.success && data.imageUrl) {
            replaceResultPlaceholder(phId, charIndex, data.imageUrl, charName);
            btn.textContent = '✅ 完成';
        } else {
            removeResultPlaceholder(phId);
            alert('化妆生成失败: ' + (data.message || '未知错误'));
            btn.textContent = '💄 化妆';
        }
    } catch (err) {
        removeResultPlaceholder(phId);
        console.error('化妆生成失败', err);
        alert('化妆生成错误: ' + err.message);
        btn.textContent = '💄 化妆';
    } finally {
        btn.disabled = false;
        setTimeout(() => { btn.textContent = '💄 化妆'; }, 3000);
    }
}

    const sorted = parsedCharacters
        .map((c, i) => ({ ...c, idx: i }))
        .sort((a, b) => (b.count || 0) - (a.count || 0));

    const candidates = [];
    for (const c of sorted) {
        if (candidates.length >= 5) break;
        const tvCol = document.getElementById(`three-view-col-${c.idx}`);
        if (!tvCol) continue;
        const img = tvCol.querySelector('img');
        if (img) {
            candidates.push({ name: c.name, count: c.count, imgSrc: img.src });
        }
    }

    if (candidates.length === 0) {
        alert('没有找到已生成三视图的角色，请先生成三视图');
        return;
    }

    const nameList = candidates.map(c => `${c.name}(${c.count}次)`).join('、');
    if (!confirm(`将使用以下 ${candidates.length} 个出场最多的角色合成剧照：\n\n${nameList}\n\n是否继续？`)) return;

    const scrollContainer = document.getElementById('unified-scroll');
    if (!scrollContainer) return;

    // 创建新行
    const row = document.createElement('div');
    row.className = 'char-data-row flex min-w-max';
    row.style.borderTop = '2px solid rgba(255,94,0,0.5)';

    let prompt = `生成一张${candidates.length}个人站在一起的图片，纯白背景，正对镜头，保持人物形象与画风保持不变。`;
    if (window.currentStylePrompt) {
        prompt = window.currentStylePrompt + '。' + prompt;
    }

    row.innerHTML = `
        <!-- 第1列+第2列合并: 提示词 -->
        <div class="w-80 border-r border-orange-900/30 h-[320px] p-4 flex flex-col space-y-3 bg-[#0d0605] sticky left-0 z-20">
            <div class="flex items-center space-x-2">
                <span class="px-1.5 py-0.5 bg-red-900/40 border border-red-600/50 text-[9px] text-red-400 font-black uppercase">🎬 合成剧照</span>
            </div>
            <div class="text-[9px] text-orange-300 leading-relaxed">${nameList}</div>
            <textarea class="flex-1 text-xs bg-[#050302] border-orange-900/40 rounded-none focus:ring-[#ff5e00] focus:border-[#ff5e00] text-orange-100 resize-none p-2">${prompt}</textarea>
        </div>
        <div class="w-[480px] border-r border-orange-900/30 h-[320px] p-4 flex flex-col">
        </div>
        <!-- 第3列空 -->
        <div class="w-[480px] border-r border-orange-900/30 h-[320px] p-2 flex flex-col">
            <div class="text-[10px] font-bold text-orange-500 uppercase tracking-widest pb-1 mb-2 flex-shrink-0">生成结果</div>
        </div>
        <!-- 第4列: 剧照结果 -->
        <div class="flex-1 h-[320px] p-2 flex flex-col">
            <div class="text-[10px] font-bold text-red-400 uppercase tracking-widest pb-1 mb-2 flex-shrink-0">🎬 合成剧照</div>
            <div id="group-photo-result" class="flex-1 flex space-x-3 items-center overflow-x-auto pb-2" style="scrollbar-width:thin; scrollbar-color:#ff5e0033 transparent;">
                <div class="flex-shrink-0 w-60 h-44 border border-orange-900/30 bg-black/40 flex flex-col items-center justify-center">
                    <div class="w-8 h-8 border-2 border-orange-400 border-t-transparent rounded-full animate-spin mb-2"></div>
                    <span class="text-[9px] text-orange-400 animate-pulse">剧照生成中...</span>
                </div>
            </div>
        </div>`;
    scrollContainer.appendChild(row);
    row.scrollIntoView({ behavior: 'smooth', block: 'end' });

    // 加载所有图片拼接
    const loadImg = (url) => new Promise((res, rej) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => res(img);
        img.onerror = rej;
        img.src = url;
    });

    try {
        const images = await Promise.all(candidates.map(c => loadImg(c.imgSrc)));
        const targetH = Math.max(...images.map(img => img.height));
        const widths = images.map(img => Math.round(img.width * (targetH / img.height)));
        const totalW = widths.reduce((s, w) => s + w, 0);

        const canvas = document.createElement('canvas');
        canvas.width = totalW;
        canvas.height = targetH;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, totalW, targetH);

        let x = 0;
        for (let i = 0; i < images.length; i++) {
            ctx.drawImage(images[i], x, 0, widths[i], targetH);
            x += widths[i];
        }
        const mergedBase64 = canvas.toDataURL('image/png');

        // 拼接相机参数
        let apiPrompt = prompt;
        const cameraPrompt = typeof getCameraPromptString === 'function' ? getCameraPromptString() : '';
        if (cameraPrompt) apiPrompt = cameraPrompt + '. ' + apiPrompt;
        const _dl3 = getDramaLightingPrompt(); if (_dl3) apiPrompt += ' ' + _dl3;

        const apiKey = document.getElementById('api-key-input')?.value?.trim() || '';
        const res = await fetch(`${API_BASE}/generate-image`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                image: mergedBase64,
                prompt: apiPrompt,
                apiKey,
                aspect_ratio: '16:9'
            })
        });
        const data = await res.json();
        const resultDiv = document.getElementById('group-photo-result');

        if (data.success && data.imageUrl) {
            if (resultDiv) {
                resultDiv.innerHTML = '';
                const card = document.createElement('div');
                card.className = 'flex-shrink-0 w-60 h-44 relative cursor-pointer group border border-red-500/50 hover:border-red-400 transition-all';
                card.innerHTML = `
                    <img src="${data.imageUrl}" class="w-full h-full object-cover opacity-85 group-hover:opacity-100 transition-opacity" />
                    <div class="new-badge absolute top-1 right-1 bg-green-500 px-1.5 py-0.5 text-[7px] text-white font-black z-10">新生成</div>
                    <a href="${data.imageUrl}" download="剧照_${Date.now()}.png" onclick="event.stopPropagation()" class="absolute bottom-1 right-1 bg-black/80 px-1 py-0.5 text-[7px] text-red-300 hover:text-white cursor-pointer">⬇</a>`;
                card.addEventListener('click', () => showLightbox(data.imageUrl));
                card.addEventListener('mouseenter', (e) => showHoverPreview(e, data.imageUrl));
                card.addEventListener('mouseleave', hideHoverPreview);
                resultDiv.appendChild(card);
            }
        } else {
            if (resultDiv) resultDiv.innerHTML = '<span class="text-[10px] text-red-400">生成失败: ' + (data.message || '未知错误') + '</span>';
        }
    } catch (err) {
        console.error('合成剧照失败', err);
        const resultDiv = document.getElementById('group-photo-result');
        if (resultDiv) resultDiv.innerHTML = '<span class="text-[10px] text-red-400">错误: ' + err.message + '</span>';
    }
}

/** 构建向量索引 */
async function vectorBuildIndex() {
    const btn = document.getElementById('btn-build-index');
    const origText = btn.textContent;
    btn.textContent = '⏳ 构建中...';
    btn.disabled = true;
    try {
        const res = await fetch(`${API_BASE}/vector/build`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
        });
        const data = await res.json();
        if (data.success) {
            let summary = '索引构建完成:\n';
            Object.entries(data.stats).forEach(([key, val]) => {
                if (val.error) summary += `  ${key}: ❌ ${val.error}\n`;
                else summary += `  ${key}: ${val.total}张 (新编码${val.built}, 复用${val.reused || 0})\n`;
            });
            alert(summary);
        } else {
            alert('构建失败: ' + (data.message || '未知错误'));
        }
    } catch (err) {
        alert('构建索引失败: ' + err.message + '\n请确认 Node 服务中的 JS CLIP 已正常初始化');
    } finally {
        btn.textContent = origText;
        btn.disabled = false;
    }
}

/** 对所有已选角色执行智能匹配 */
async function vectorAutoMatchAll() {
    if (!parsedCharacters || parsedCharacters.length === 0) {
        alert('请先上传角色设定');
        return;
    }

    // 检查索引状态
    try {
        const statusRes = await fetch(`${API_BASE}/vector/status`);
        const statusData = await statusRes.json();
        if (!statusData.clipServiceAvailable) {
            alert('JS CLIP 尚未就绪，请先启动 Node 服务并等待模型初始化完成');
            return;
        }
        // 检查是否有索引
        const totalIndexed = Object.values(statusData.indexes).reduce((sum, idx) => sum + idx.count, 0);
        if (totalIndexed === 0) {
            if (confirm('向量索引为空，需要先构建索引。\n是否现在构建？')) {
                await vectorBuildIndex();
            }
            return;
        }
    } catch (err) {
        alert('无法连接 JS CLIP 运行时: ' + err.message);
        return;
    }

    const btn = document.getElementById('btn-smart-match');
    const origText = btn.textContent;
    const checkedChars = [];

    // 收集选中的角色
    parsedCharacters.forEach((ch, i) => {
        const cb = document.querySelector(`.character-row[data-char-index="${i}"] input[type="checkbox"]`);
        if (cb && cb.checked) {
            checkedChars.push({ index: i, character: ch });
        }
    });

    if (checkedChars.length === 0) {
        // 如果没有选中的，匹配全部
        parsedCharacters.forEach((ch, i) => checkedChars.push({ index: i, character: ch }));
    }

    btn.textContent = `⏳ 匹配中 0/${checkedChars.length}`;
    btn.disabled = true;

    let matchedCount = 0;
    const usedFaceUrls = new Set(); // 脸部去重：同一张脸只分配给一个角色
    const usedHalfbodyUrls = new Set(); // 半身图去重：同一张半身图只分配给一个角色

    // 将前端风格标签映射为 API 风格代码
    const currentStyle = getCurrentStyleCode();
    console.log(`[智能匹配] 当前风格过滤: ${window.currentStyleLabel} → ${currentStyle || '不限'}`);

    for (const { index: charIndex, character } of checkedChars) {
        clearStandaloneMatchExamples(charIndex);
        // 清除旧的 face/hair/clothes 缓存，确保 CLIP 结果替换旧图片
        if (charStates[charIndex]) {
            charStates[charIndex].face = {};
            charStates[charIndex].hair = {};
            charStates[charIndex].clothes = {};
        }
        try {
            const res = await fetch(`${API_BASE}/vector/auto-match`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    character: {
                        name: character.name,
                        gender: character.gender === 'male' ? '男' : '女',
                        age: character.age || '',
                        hair_description: character.hair_description || '',
                        clothing_description: character.clothingPrompt || character.clothing_description || '',
                        face_description: character.face_description || '',
                        original_text: character.prompt || '',
                        preferred_face_folder: character.preferredFaceSubfolder || '',
                        preferred_hair_folder: character.preferredHairSubfolder || '',
                        preferred_clothes_folder: character.preferredClothesSubfolder || '',
                        exclude_face_urls: [...usedFaceUrls],
                        exclude_halfbody_urls: [...usedHalfbodyUrls],
                        style: currentStyle
                    },
                    topK: 3
                })
            });
            const data = await res.json();
            if (data.success) {
                // 记录已用的脸部 URL
                if (data.face && data.face.length > 0) {
                    usedFaceUrls.add(data.face[0].url);
                }
                // 记录已用的半身图 URL
                if (data.halfbody && data.halfbody.length > 0 && data.halfbody[0].score >= 0.20) {
                    usedHalfbodyUrls.add(data.halfbody[0].url);
                }
                applyAutoMatchResult(charIndex, data);
                matchedCount++;
            }
        } catch (err) {
            console.error(`匹配角色 ${character.name} 失败:`, err);
        }
        if (currentStyle === '2d') {
            await fetchAnimeFaceExamples(charIndex, character);
        }
        btn.textContent = `⏳ 匹配中 ${matchedCount}/${checkedChars.length}`;
    }

    btn.textContent = origText;
    btn.disabled = false;
    saveCharacterState();

    // 智能匹配完成后，自动为已选角色匹配三视图（每个角色1张）
    await autoMatchThreeViews(parsedCharacters);

    alert(`智能匹配完成！共匹配 ${matchedCount}/${checkedChars.length} 个角色`);
}

/** 将匹配结果自动填入角色的图片框 */
function applyAutoMatchResult(charIndex, matchData) {
    // 填入脸型（取 Top-1）
    if (matchData.face && matchData.face.length > 0) {
        const best = matchData.face[0];
        const imgUrl = best.url.startsWith('http') ? best.url : `${IMAGES_SERVER}${best.url}`;
        if (!charStates[charIndex]) charStates[charIndex] = { face: {}, hair: {}, clothes: {} };
        charStates[charIndex].face.image = imgUrl;
        charStates[charIndex].face.matchScore = best.score;
        updatePartPreview(charIndex, 'face');
    }

    // 填入发型（取 Top-1）
    if (matchData.hair && matchData.hair.length > 0) {
        const best = matchData.hair[0];
        const imgUrl = best.url.startsWith('http') ? best.url : `${IMAGES_SERVER}${best.url}`;
        if (!charStates[charIndex]) charStates[charIndex] = { face: {}, hair: {}, clothes: {} };
        charStates[charIndex].hair.image = imgUrl;
        charStates[charIndex].hair.matchScore = best.score;
        updatePartPreview(charIndex, 'hair');
    }

    // 服装匹配结果不自动填入（用户不需要自动匹配服装参考）
    // if (matchData.clothes && matchData.clothes.length > 0) { ... }

    // 填入三视图到第四列（取 Top-1）
    if (matchData.threeview && matchData.threeview.length > 0) {
        const best = matchData.threeview[0];
        const imgUrl = best.url.startsWith('http') ? best.url : `${IMAGES_SERVER}${best.url}`;
        // 使用 addToThreeViewCol 确保持久化（内部会调用 saveCharacterState）
        const charName = parsedCharacters[charIndex]?.name || '角色';
        addToThreeViewCol(charIndex, imgUrl, charName, {
            sourceType: 'smart-match',
            replaceSourceType: 'smart-match',
            showNewBadge: false,
            sourceBadgeLabel: '智能匹配'
        });
    }

    // 填入半身图到第三列（取 Top-1，需满足最低相似度阈值）
    if (matchData.halfbody && matchData.halfbody.length > 0) {
        const best = matchData.halfbody[0];
        if (best.score >= 0.20) {
            const imgUrl = best.url.startsWith('http') ? best.url : `${IMAGES_SERVER}${best.url}`;
            const charName = parsedCharacters[charIndex]?.name || '角色';
            // 清除旧的智能匹配半身图
            const resultsDiv = document.getElementById(`results-${charIndex}`);
            if (resultsDiv) {
                resultsDiv.querySelectorAll('[data-source-type="halfbody-match"]').forEach(el => el.remove());
            }
            addResultImage(charIndex, imgUrl, charName, true);
            // 给新添加的结果标记来源
            if (resultsDiv) {
                const firstWrapper = resultsDiv.querySelector('.flex-shrink-0');
                if (firstWrapper) {
                    firstWrapper.dataset.sourceType = 'halfbody-match';
                    // 将"新生成"标签改为"智能匹配"
                    const badge = firstWrapper.querySelector('.bg-green-600');
                    if (badge) {
                        badge.textContent = '智能匹配';
                        badge.classList.remove('bg-green-600');
                        badge.classList.add('bg-emerald-600');
                    }
                }
            }
        }
    }

    // 添加相似度徽章
    addMatchScoreBadges(charIndex, matchData);

    // 检查是否可以生成
    checkCanGenerate(charIndex);

    // 确保状态持久化
    saveCharacterState();
}

/** 在图片框上添加匹配度徽章 */
function addMatchScoreBadges(charIndex, matchData) {
    const parts = ['face', 'hair', 'clothes'];
    parts.forEach(part => {
        if (matchData[part] && matchData[part].length > 0) {
            const score = matchData[part][0].score;
            const pct = Math.round(score * 100);
            const partEl = document.getElementById(`part-${part}-${charIndex}`);
            if (partEl) {
                // 移除旧徽章
                partEl.querySelectorAll('.match-badge').forEach(b => b.remove());
                // 添加新徽章
                const badge = document.createElement('div');
                badge.className = 'match-badge absolute bottom-0 right-0 text-[7px] font-bold px-1 py-0.5 z-10 ' +
                    (pct >= 80 ? 'bg-emerald-600 text-white' :
                     pct >= 60 ? 'bg-yellow-600 text-white' :
                                 'bg-orange-700 text-white');
                badge.textContent = `${pct}%`;
                badge.title = `CLIP 相似度: ${(score * 100).toFixed(1)}%`;
                partEl.style.position = 'relative';
                partEl.appendChild(badge);
            }
        }
    });
}
