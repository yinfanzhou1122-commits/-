<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>角色筛选机 - 初始化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0a0504;
            color: #ff6a00;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 106, 0, 0.5);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 106, 0, 0.2);
            border-top-color: #ff6a00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            font-size: 14px;
            color: #ccc;
            margin-top: 10px;
        }
        .progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(255, 106, 0, 0.2);
            border-radius: 2px;
            margin: 15px auto;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #ff6a00;
            width: 0%;
            transition: width 0.3s;
            border-radius: 2px;
        }
        .error { color: #ff4444; }
        .btn-retry {
            display: none;
            margin-top: 20px;
            padding: 8px 24px;
            background: #ff6a00;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-retry:hover { background: #ff8533; }
    </style>
</head>
<body>
    <div class="container">
        <h1>角色筛选机</h1>
        <div class="spinner" id="spinner"></div>
        <div class="status" id="status">正在初始化...</div>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <button class="btn-retry" id="btnRetry" onclick="retry()">重试</button>
    </div>
    <script>
        const { ipcRenderer } = require('electron');
        const statusEl = document.getElementById('status');
        const progressEl = document.getElementById('progress');
        const btnRetry = document.getElementById('btnRetry');
        const spinner = document.getElementById('spinner');

        ipcRenderer.on('download-progress', (event, data) => {
            if (data.percent !== undefined) {
                progressEl.style.width = data.percent + '%';
            }
            if (data.message) {
                statusEl.textContent = data.message;
            }
            if (data.phase === 'error') {
                statusEl.classList.add('error');
                btnRetry.style.display = 'inline-block';
                spinner.style.display = 'none';
            }
            if (data.phase === 'complete') {
                statusEl.textContent = '初始化完成，正在启动...';
                progressEl.style.width = '100%';
            }
        });

        function retry() {
            statusEl.classList.remove('error');
            btnRetry.style.display = 'none';
            spinner.style.display = 'block';
            statusEl.textContent = '重试中...';
            progressEl.style.width = '0%';
            ipcRenderer.send('retry-download');
        }
    </script>
</body>
</html>
